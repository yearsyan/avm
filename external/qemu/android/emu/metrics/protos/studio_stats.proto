  enum ErrorType {
    UNKNOWN = 0;
    // Failed to install the crawler or test APK
    ADB_INSTALL_FAILED = 1;
    // Failed to setup ADB forwarding
    ADB_FORWARDING_FAILED = 2;
    // Failed to extract the Robo port
    ROBO_PORT_EXTRACTION_FAILED = 3;
    // Failed to run the instrumentation
    INSTRUMENTATION_FAILED = 4;
    // Failed to read the Journey file
    JOURNEY_READ_FAILED = 5;
    // Failed to authenticate with the Robo server
    AUTHENTICATION_FAILED = 6;
    // The engine failed to determine the error
    UNKNOWN_ERROR = 7;
    // The crawler ran out of time before exploring all actions
    CRAWLER_TIMED_OUT = 8;
    // The app terminated during the crawl
    APP_TERMINATED = 9;
    // The crawler service was terminated unexepectedly (e.g. OOM)
    CRAWLER_TERMINATED = 10;
    // The crawl was canceled by the user
    CRAWLER_CANCELLED = 11;
    // The agent timed out
    AGENT_TIMED_OUT = 12;
    // The agent returned a RESOURCE_EXHAUSTED error
    AGENT_RESOURCE_EXHAUSTED = 13;
    // The app failed to launch
    LAUNCH_APP_FAILED = 14;
  }

  optional ErrorType error_type = 1;
}

message BackupAndSyncEvent {
  enum Type {
    TYPE_UNKNOWN = 0;
    // Settings were synced (logged once per session)
    TYPE_SYNC = 1;
    // Sync was enabled (through any mechanism). This will always be logged on
    // enablement.
    TYPE_ENABLED = 2;
    // Sync was disabled
    TYPE_DISABLED = 3;
    // Sync was enabled through the Studio-specific flows, where the onboarding
    // wizard is shown. Note an event with TYPE_ENABLED will also be logged.
    TYPE_ENABLED_THROUGH_WIZARD = 4;
    // The user changed the synced categories
    TYPE_CHANGE_CATEGORIES = 5;
  }

  enum Provider {
    UNKNOWN_PROVIDER = 0;
    // Uses Google Drive to store the settings
    GOOGLE = 1;
    // Uses Jetbrains backend service to store the settings
    JETBRAINS = 2;
  }

  enum EnablementFlow {
    UNKNOWN_FLOW = 0;
    // Enable via the unified sign-in flow
    UNIFIED_SIGN_IN_FLOW = 1;
    // Enable via the Google Accounts settings page (feature allow button)
    ACCOUNT_SETTINGS_PAGE = 2;
    // Enable via the Backup and Sync settings page. Currently unused since
    // there's no appropriate hook in JB code to log in this situation.
    FEATURE_SETTINGS_PAGE = 3;
  }

  optional Provider provider_in_use = 1;
  optional EnablementFlow enablement_flow = 2;
  optional Type type = 3;
}

