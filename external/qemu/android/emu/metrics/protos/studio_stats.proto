  }

  enum AppQualityInsightsProductType {
    UNKNOWN_PRODUCT_TYPE = 0;
    CRASHLYTICS = 1;
    PLAY_VITALS = 2;
  }

  message EventDetails {
    // Hashed string that uniquely identifies an issue.
    optional string issue_id = 1;
    // Hashed string that uniquely identifies an event.
