    BOUNDS = 1;
    BOTTOM_NAV = 2;
    BOTTOM_APP_BAR = 3;
    OVERLAP = 4;
    LONG_TEXT = 5;
    ATF = 6;
    LOCALE_TEXT = 7;
    TEXT_FIELD_SIZE = 8;
    BUTTON_SIZE = 9;
    WEAR_MARGIN = 10;
    ATF_COLORBLIND = 11;
  }

  // Type of events affecting visual lint issues
  enum IssueEvent {
    UNKNOWN_EVENT = 0;
    CREATE_ISSUE = 1;
    EXPAND_ISSUE = 2;
    IGNORE_ISSUE = 3;
    ENABLE_RULE = 4;
    DISABLE_RULE = 5;
    ENABLE_BACKGROUND_RULE = 6;
    DISABLE_BACKGROUND_RULE = 7;
    CLICK_DOCUMENTATION_LINK = 8;
    CANCEL_BACKGROUND_ANALYSIS = 9;
  }

  // Possible origins for visual lint event
