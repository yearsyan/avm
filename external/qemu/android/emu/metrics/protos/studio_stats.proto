  // DEPRECATED Use CompletionAggregateEvent instead
  message CompletionAccepted {
    option deprecated = true;

    // Historical: Not used starting with Android Studio 2023.2.1.11
    optional SmlResponseMetadata metadata = 1 [deprecated = true, lazy = true];
    // Historical: Not used starting with Android Studio 2023.2.1.11
    optional int32 accepted_suggestion_index = 2 [deprecated = true];
    // Historical: Not used starting with Android Studio 2023.2.1.11
    optional int32 accepted_suggestion_length = 3 [deprecated = true];
  }

  message CompletionAggregateEvent {
    enum Trigger {
      UNKNOWN = 0;

      // User explicitly triggered completion
      USER = 1;

      // Completion was automatically triggered
      AUTOMATIC = 2;
    }

    optional string model_id = 1;
    optional Trigger trigger = 2;
    optional EditorFileType file_type = 3;
    optional uint32 completions_shown = 4;
    optional uint32 completions_accepted = 5;
    optional Histogram latencies_ms = 6 [lazy = true];
    optional Histogram not_accepted_shown_durations_ms = 7 [lazy = true];
    optional int32 completion_responses = 8;
    optional int32 completion_responses_with_all_citations = 9;
    optional int32 completion_responses_with_some_citations = 10;
    optional int32 completion_responses_with_no_citations = 11;
    optional Histogram suggestions_per_response = 12 [lazy = true];
  }

  oneof completion {
    // Historical: Not used starting with Android Studio 2023.2.1.11
    CompletionRequest request = 1 [deprecated = true, lazy = true];
    // Historical: Not used starting with Android Studio 2023.2.1.11
    CompletionResponse response = 2 [deprecated = true, lazy = true];
    // Historical: Not used starting with Android Studio 2023.2.1.11
    CompletionShown shown = 3 [deprecated = true, lazy = true];
    // Historical: Not used starting with Android Studio 2023.2.1.11
    CompletionAccepted accepted = 4 [deprecated = true, lazy = true];
    CompletionAggregateEvent aggregate = 5 [lazy = true];
  }
}

message SmlTransformEvent {
  message TransformRequest {
    // Full file size if it's attached to a request.
    // In case of multiple files it would be a sum of all sizes.
    optional uint32 context_length = 1;
    // A size of a code snippet passed to models:
    // It could be a user selection in case of simple transform,
    // or a region extended to the closest declaration.
    optional uint32 selection_length = 2;
  }

  message TransformResult {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional uint64 latency_ms = 2;
    optional int32 num_transformations = 3;
    repeated SmlCitationInfo citations = 4;
  }

  message TransformError {
    optional int32 status_code = 1;
    enum FailureCause {
      UNKNOWN_CAUSE = 0;
      // Unexpected errors; should be converted to more specific causes.
      RUNTIME_EXCEPTION = 1;
      // gRPC, HTTP, or other backend and network errors.
      BACKEND_ERROR = 2;
      // The response was empty or identical to the input.
      EMPTY_RESPONSE = 3;
      // The response doesn't contain expected elements or cannot be parsed.
      INVALID_FORMAT = 4;
      // The response is blocked because it contains citations.
      CITATIONS_BLOCKED = 5;
    }
    optional FailureCause cause = 2;
    // The name of the exception class, used to identify RUNTIME_EXCEPTION.
    // Exception class names only contain compile-time information.
    optional string exception_class_name = 3;
    optional SmlResponseMetadata metadata = 4 [lazy = true];
  }

  message TransformResponse {
    oneof response {
      TransformResult result = 1 [lazy = true];
      // Use failure instead to represent both backend and parsing errors.
      TransformError backend_error = 2 [lazy = true, deprecated = true];
      TransformError failure = 3 [lazy = true];
    }
  }

  message TransformShown {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
  }

  message TransformAccepted {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
  }

  message TransformRejected {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
  }

  oneof transform {
    TransformRequest request = 1 [lazy = true];
    TransformResponse response = 2 [lazy = true];
    TransformShown shown = 3 [lazy = true];
    TransformAccepted accepted = 4 [lazy = true];
    TransformRejected rejected = 6 [lazy = true];
  }

  enum TransformKind {
    UNKNOWN = 0;
    CUSTOM = 1;
    DOCUMENT = 2;
    // For Compose preview transform that includes both image and code.
    MULTIMODAL_COMPOSE_PREVIEW = 3;
    // For Compose Preview generation action.
    GENERATE_COMPOSE_PREVIEW = 4;
    // For Insight Suggested Fix generation action.
    GENERATE_INSIGHT_SUGGESTED_FIX = 5;
  }

  enum TransformPhase {
    UNKNOWN_PHASE = 0;
    INITIAL_TRANSFORM = 1;
    REFINE = 2;
    REGENERATE = 3;
  }

  // The kind of transform, which will be used to differentiate
  // metrics for Document action, Custom transforms etc.
  optional TransformKind transform_kind = 5;

  // Session id is used to group all the events for a single transform session
  // which could contain an initial transform and multiple refinements.
  optional string session_id = 7;

  // used to differentiate the initial transfrom and follow ups
  optional TransformPhase transform_phase = 8;
}

message SmlChatBotEvent {
  enum ChatMode {
    OTHER_MODE = 0;
    CHAT = 1;
    AGENT_MODE = 2;
    VERSION_UPGRADE_AGENT = 3;
    QUICK_EDIT = 4;
    PLANNING = 5;
  }

  message BotResponse {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional uint64 latency_ms = 2;

    // Currently, fact retrieval is a different API from the chat API. But
    // retrieval's only use is for the chat API, so here we model it as part
    // of the chat event since we'll very likely want to associate it with
    // the corresponding chat event. (Note that retrieval by itself doesn't
    // have a trace id, so including it here allows us to associate it with the
    // chat event).
    optional uint64 retrieval_latency_ms = 3;

    optional ChatMode chat_mode = 4;
  }

  message UserFeedback {
    optional SmlResponseMetadata metadata = 1 [lazy = true];

    enum Sentiment {
      UNKNOWN = 0;
      POSITIVE = 1;
      NEGATIVE = 2;
    }

    optional Sentiment sentiment = 2;
  }

  enum EntryPoint {
    UNKNOWN = 0;
    DOCUMENT = 1;
    COMMENT = 2;
    SIMPLIFY = 3;
    EXPLAIN = 4;
    OTHER_EDITOR = 5;
    IDE_ERROR = 6;
    SYNC = 7;
    BUILD = 8;
    CRASHLYTICS = 9;
    PLAY_VITALS = 10;
    LOGCAT = 11;
    REFACTORING_MENU = 12;
    UPDATE_DEPENDENCY_ACTION = 13;
    QUICK_EDIT_ACTION = 14;
  }

  message BotInvoked {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional EntryPoint entry_point = 2;
  }

  enum Action {
    INVALID = 0;
    MOVE_TO_EDITOR = 1;
    MOVE_TO_CARET = 2;
    MOVE_TO_NEW_FILE = 3;
    ADD_DEPENDENCY = 4;
    BROWSE_TOPIC = 5;
    EXPLORE_IN_PLAYGROUND = 6;
    MERGE_MANIFEST = 7;
    MERGE_SUGGESTION = 9;
    INSERT_RESOURCES = 10;
    INSERT_NAME_SUGGESTIONS = 11;
    COPY_BUTTON = 12;
    COPY_MANUAL = 13;
  }

  message ActionInvoked {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional Action action = 2;
    optional EditorFileType file_type = 3;
  }

  message ActionResult {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional Action action = 2;
    optional EditorFileType file_type = 3;
    optional bool success = 4;
  }

  message DependencySuggestion {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional bool accepted = 2;
  }

  enum Command {
    CMD_OTHER = 0;
    CMD_ABOUT = 1;
    CMD_HELP = 2;
    CMD_CLEAR = 3;
    CMD_HISTORY = 4;
    CMD_CLOSE = 5;
    CMD_SCREENSHOT = 6;
    CMD_SAVE = 7;
    CMD_ME = 8;
    CMD_EDIT = 9;
    CMD_UNDO = 10;
    CMD_REDO = 11;
    CMD_FORMAT = 12;
    CMD_RENAME = 13;
    CMD_BUILD = 14;
    CMD_RUN = 15;
    CMD_DEBUG = 16;
    CMD_PROFILE = 17;
    CMD_TEST = 18;
    CMD_STOP = 19;
    CMD_SYNC = 20;
    CMD_TERMINAL = 21;
    CMD_SPLIT = 22;
    CMD_UNSPLIT = 23;
    CMD_OPEN = 24;
    CMD_GOTOTEST = 25;
  }

  message SlashAction {
    optional Command command = 1;
  }

  message ParseResult {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional EditorFileType file_type = 2;
    // success indicates that the code snippet was able to be parsed
    // without throwing any errors, e.g. PSI related exceptions.
    optional bool success = 3 [deprecated = true];
    // has_error indicates that the code snippet was parsed successfully,
    // but contains one or more syntax errors.
    optional bool has_error = 4;
    optional bool did_timeout = 5;
  }

  enum CodeDomain {
    UNDEFINED = 0;
    COMPOSE = 1;
  }

  enum HallucinationType {
    OTHER = 0;
    // covers unresolved symbols, mismatched types in calls, wrong number
    // of parameters, wrong receiver type, etc. - anything which means the
    // model made up an API or used one in the wrong way.
    BAD_API = 1;
    // covers errors that arise when the semantics of composables are not
    // followed, like invoking a composable from a non-composable context
    COMPOSE_SEMANTICS = 2;
  }

  message HallucinationDetectorResult {
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional bool has_hallucination = 2;
    optional EditorFileType file_type = 3;
    // libraries, frameworks, or other categories applicable to the code snippet
    repeated CodeDomain code_domains = 4 [packed = true];
    // types of hallucinations detected in the snippet
    repeated HallucinationType hallucination_types = 5 [packed = true];
    optional bool did_timeout = 6;
  }

  enum QueryBoxEventType {
    QUERY_BOX_OTHER = 0;
    COMPLETION_STARTED = 1;
    COMPLETION_ACCEPTED = 2;
    COMPLETION_DISMISSED = 3;
    QUERY_WITH_CONTEXT_SUBMITTED = 4;
    REFERENCE_DELETED = 5;
    IMAGE_ATTACHMENT_CLICKED = 6;
    QUERY_STOPPED = 7;
  }

  message QueryBoxEventMetadata {
    // Information about a file that was used as context for a query.
    message ContextFileStats {
      enum ContextProvider {
        UNKNOWN_CONTEXT_PROVIDER = 0;
        AGENT_MD = 1;
        RECENT_FILE = 2;
        CURRENT_FILE = 3;
        ATTACHED_BY_USER = 4;
      }
      // The provider of the context file.
      optional ContextProvider context_provider = 1;
      // The size of the file in bytes.
      optional int64 file_size = 2;
    }

    enum AttachmentType {
      UNKNOWN = 0;
      FILES = 1;
      FOLDERS = 2;
      TOOLS = 3;
      PROMPT_LIBRARY = 4;
      REMOTE_CONTEXT = 5;
      SKILLS = 6;
    }
    // The type of attachment, e.g. "FILES, FOLDERS, TOOLS, PROMPT_LIBRARY,
    // REMOTE_CONTEXT, SKILLS"
    optional AttachmentType attachment_type = 1;
    // The number of attachments of the given type.
    optional int32 attachment_count = 2;
    // Only valid when attachment_type is "FILES".
    repeated ContextFileStats context_file_stats = 3;
  }

  message QueryBoxEvent {
    optional QueryBoxEventType event_type = 1;
    optional QueryBoxEventMetadata event_metadata = 2;
  }

  enum ContextDrawerEventType {
    CONTEXT_DRAWER_OTHER = 0;
    CONTEXT_DRAWER_OPENED = 1;
    CONTEXT_DRAWER_ITEM_REMOVED = 2;
  }

  message ContextDrawerEvent {
    optional ContextDrawerEventType event_type = 1;
  }

  // A "change" is a diff to a file that is put up for review by the user.
  // A change is made up of one or more diff chunks which can be resolved by
  // accepting or rejecting them individually, or all at once.
  // A change is "resolved" when all of the chunks are resolved, and this
  // event should be logged when that happens.
  message ChangeResolved {
    // The total number of chunks that were proposed in this change.
    // Should be equal to:
    // total_chunks_accepted + total_chunks_rejected + chunks_iterated
    optional int32 total_chunks = 1;

    // Chunks can be accepted/rejected either from the editor or from the
    // drawer UI.
    optional int32 chunks_rejected_in_editor_count = 2;
    optional int32 chunks_rejected_in_drawer_count = 3;
    optional int32 chunks_accepted_in_editor_count = 4;
    optional int32 chunks_accepted_in_drawer_count = 5;

    // When multiple rounds of changes are made to a file, some chunks may
    // be overwritten before they can be accepted or rejected. We count those
    // in this field.
    optional int32 chunks_iterated = 6;

    // Chunks can be resolved from the drawer UI, either on a file-by-file
    // basis or en-masse.
    enum FinalResolutionAction {
      UNKNOWN = 0;
      // This change was resolved from the editor.
      RESOLVED_IN_EDITOR = 1;
      // This change was resolved by the user clicking the accept button
      // for this change
      ACCEPT_INDIVIDUAL = 2;
      // This change was resolved by the user clicking the accept all button
      ACCEPT_ALL = 3;
      // This change was resolved by the user clicking the reject button
      // for this change
      REJECT_INDIVIDUAL = 4;
      // This change was resolved by the user clicking the reject all button
      // for this change
      REJECT_ALL = 5;
      // Switching sessions (threads) will accept all the changes
      ACCEPT_ALL_SWITCHED_SESSION = 6;
      // The user closed the IDE, which accepts all the pending changes
      ACCEPT_ALL_CLOSED_IDE = 7;
    }

    optional FinalResolutionAction resolution_action = 7;

    // One change might be the result of more than one tool call, and
    // this is the list of all of them.
    repeated string tool_call_ids = 8;
  }

  message ChangesDrawerEvent {
    optional ChangeResolved change_resolved = 1;
  }

  message ToolCall {
    optional string tool_name = 1;
    optional SmlResponseMetadata metadata = 2 [lazy = true];
    // This id should uniquely identify a tool call and be shared with all
    // of its subsequent events (response, follow-up, etc.)
    optional string tool_call_id = 3;
  }

  enum ToolCallStatus {
    OTHER_STATUS = 0;
    // The tool requires permission, but the user had auto-accept
    // on so it was automatically executed
    AUTO_ACCEPTED = 1;
    // The tool requires permission, and the user does not have auto-accept
    // on for this tool, so it was proposed.
    PROPOSED = 2;
    // After being proposed, the tool call was accepted.
    ACCEPTED_MANUALLY = 3;
    // After being proposed, the tool call was rejected.
    REJECTED = 4;
    // After being accepted either manually or automatically, the tool
    // call was reverted.
    REVERTED = 5;
    // A severe error occurred when parsing or executing the tool call. This
    // should indicate that the model actually did something wrong, like trying
    // to access a non-existent file, or replace non-existent text in a file.
    ERROR_SEVERE = 6;
    // An error occurred, but it may not be because that the model actually did
    // anything wrong. For example, files being blocked by aiexclude,
    // indices not being ready, or no document/PsiFile being available for a
    // file should fall under this category, but it is somewhat up to
    // interpretation.
    ERROR_MINOR = 7;
  }

  message ToolCallFollowUpEvent {
    optional string tool_name = 1;
    optional ToolCallStatus status = 2;
    optional SmlResponseMetadata metadata = 3 [lazy = true];
    optional string tool_call_id = 4;
  }

  enum ToolCallResponseStatus {
    UNKNOWN_RESPONSE_STATUS = 0;
    // The tool call was successfully executed. Prefer more specific status
    // where possible.
    OK = 1;
    // An error occurred when executing the tool call. Prefer more specific
    // errors where possible.
    ERROR_OCCURRED = 2;
    // The file was not found.
    ERR_FILE_NOT_FOUND = 3;
    // The file was not accessible.
    ERR_FILE_INACCESSIBLE = 4;
    // The file was not in the project.
    ERR_FILE_NOT_IN_PROJECT = 5;
    // The file was blocked by AI exclude.
    ERR_FILE_BLOCKED_BY_AI_EXCLUDE = 6;
    // Encountered an IOException when executing the tool call.
    ERR_IO_EXECPTION = 7;
    // No occurrences were found to replace in the replace text tool.
    ERR_REPLACE_TEXT_NO_OCCURRENCES_FOUND_TO_REPLACE = 8;
    // The new text is identical to the current text.
    ERR_WRITE_FILE_NEW_TEXT_IDENTICAL_TO_CURRENT = 9;
    // The user rejected the tool call.
    ERR_USER_REJECTED_PROPOSAL = 10;
    // The build finished successfully.
    BUILD_FINISHED_SUCCESSFULLY = 11;
    // The build finished with errors.
    // The output had "Build finished with errors" in it.
    BUILD_FINISHED_WITH_ERRORS = 12;
    // The build failed to finish. The output had "Build failed" in it.
    BUILD_FAILED = 13;
    // The build was interrupted.
    BUILD_INTERRUPTED = 14;
    // Gradle tool could not find any modules in the project.
    GRADLE_ERR_NO_MODULES = 15;
    // Gradle tool could not run because project is not android.
    GRADLE_ERR_NOT_ANDROID = 16;
    // Gradle tool could not find the module.
    GRADLE_ERR_MODULE_NOT_FOUND = 17;
    // Gradle tool could not find the artifact.
    GRADLE_ERR_ARTIFACT_NOT_FOUND = 18;
    // Gradle tool could not find the variant.
    GRADLE_ERR_VARIANT_NOT_FOUND = 19;
    // Artifact provided to the Gradle tool was different type than expected.
    GRADLE_ERR_WRONG_ARTIFACT = 20;
    // Requested data was missing.
    GRADLE_ERR_MISSING_DATA = 21;
    // The build task was not found.
    BUILD_TASK_NOT_FOUND = 22;
    // This is a successful response from a sub-agent call and embedded in the
    // response is the result of the sub-agent call.
    SUB_AGENT_RESULT = 23;
    // Sub-agent terminated without a proper response.
    SUB_AGENT_ENDED_WITHOUT_RESPONSE = 24;
    // The arguments provided to the tool call were invalid.
    ERR_INVALID_ARGUMENTS = 25;
    // The URL provided to the tool call was invalid.
    ERR_INVALID_URL = 26;
  }

  message ToolCallResponse {
    optional string tool_name = 1;
    // The status of the tool call response.
    optional ToolCallResponseStatus response_status = 2;
    optional SmlResponseMetadata metadata = 3 [lazy = true];
    optional string tool_call_id = 4;
    oneof result {
      UpdateDepsRefactoringToolResult update_deps_refactoring_tool_result = 5;
    }
  }

  // The result of the update dependencies tool which indicates the
  // suggested dependency updates. Also contains information if the user
  // accepted/rejected the suggestions.
  message UpdateDepsRefactoringToolResult {
    repeated DependencySuggestion dependency_suggestions = 1;

    // The dependency suggestion made by the tool.
    message DependencySuggestion {
      // The artifact ID of the dependency.
      optional string artifact = 1;
      // The current version of the dependency.
      optional string from_version = 2;
      // The target version of the dependency.
      optional string to_version = 3;
      // Whether the dependency suggestion was accepted by the user.
      optional bool accepted = 4;
    }
  }

  message DeprecationShown {
    optional DevServiceDeprecationInfo service_deprecation_info = 1
        [lazy = true];
  }

  // The details about the error that occurred during bot conversation.
  message BotResponseError {
    // Metadata about a Bot conversation.
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    // The exception that caused the error. This is a fully qualified class
    // name.
    optional string exception_type = 2;
  }

  message SessionManagerEvent {
    message ListChats {
      // Number of chats returned to the Recent Chats UI
      optional int32 count = 1;
      // Chat mode within the timeline either Chat or Agent
      optional ChatMode chat_mode = 2;
      // Time in milliseconds to fetch the list
      optional int32 latency_millis = 3;
    }

    message LoadChat {
      // Chat mode within the timeline either Chat or Agent
      optional ChatMode chat_mode = 1;
      // Time in milliseconds to load the Session from disk (this does not mean
      // loading the Session into the timeline)
      optional int32 latency_millis = 2;
    }

    oneof event {
      // Event logged when list of Sessions is fetched from SessionManager
      ListChats list_chats = 1;
      // Event logged when a Session is loaded from disk
      LoadChat load_chat = 2;
    }
  }

  // Events triggered from the "Recent Chats" Popup associated with the Chat
  // Timeline experience.
  message RecentChatsEvent {
    message ChatSession {
      // Unique identifier for the Chat Session
      optional string session_id = 1;
      // The last time the Chat Session was modified, in milliseconds since the
      // epoch
      optional int64 last_modified_timestamp_millis = 2;
    }

    message SelectChat {
      // Chat mode within the timeline either Chat or Agent
      optional ChatMode chat_mode = 1;
      // The existing session that was selected
      optional ChatSession selected_session = 2;
      // The session that was closed to select a different chat Session
      optional ChatSession closed_session = 3;
    }

    message DeleteChat {
      // Chat mode within the timeline either Chat or Agent
      optional ChatMode chat_mode = 1;
      // The session that was deleted
      optional ChatSession deleted_session = 2;
    }

    message NewChat {
      // Chat mode within the timeline either Chat or Agent
      optional ChatMode chat_mode = 1;
      // The session that was closed to create a new chat Session
      optional ChatSession closed_session = 2;
    }

    oneof action {
      // Event logged when a user selects a Chat Session from the Recent Chats
      // Popup
      SelectChat select_chat = 1;
      // Event logged when a user deletes a Chat Session from the Recent Chats
      // Popup
      DeleteChat delete_chat = 2;
      // Event logged when a user creates a new Chat Session from the Recent
      // Chats Popup
      NewChat new_chat = 3;
    }
  }
  enum ConversationAction {
    UNKNOWN_ACTION = 0;
    // Delete a conversation(request and response pairs).
    DELETE = 1;
    // Edit and resend a request.
    EDIT = 2;
    // Regenerate the response for the same request.
    REGENERATE = 3;
  }
  message ConversationActionInvoked {
    // Metadata about the conversation on which action is being performed on.
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    // The action performed by the user on a chat bot conversation (e.g. edit,
    // delete).
    optional ConversationAction conversation_action = 2;
    // The chat mode (e.g. chat, agent etc) the user was in when performing the
    // action.
    optional ChatMode chat_mode = 3;
  }

  message PlanningModeEvent {
    // The implementation plan for this task was created for the first time
    message PlanCreated {}
    // The user approved the implementation plan.
    message PlanApproved {}
    // The user sent comments on the implementation plan
    message CommentsSent {
      optional int32 comments_count = 1;
    }
    // An artifact (implementation_plan, task_list, walkthrough, etc.) was
    // edited by the agent.
    message ArtifactEdited {
      optional string artifact_name = 1;
    }
    // The conversation session this event happened in.
    optional string session_id = 1;
    oneof event {
      PlanCreated plan_created = 2;
      PlanApproved plan_approved = 3;
      CommentsSent comments_sent = 4;
      ArtifactEdited artifact_edited = 5;
    }
  }

  // Event related to banners displayed in the chat timeline.
  message TimelineBannerEvent {
    enum BannerType {
      BANNER_TYPE_UNKNOWN = 0;
      RESOURCE_EXHAUSTED_ERROR_BANNER = 1;
    }

    enum EventType {
      UNKNOWN_EVENT = 0;
      // The banner was shown.
      SHOWN = 1;
      // User dismissed the banner.
      DISMISSED = 2;
    }

    // Metadata about a Bot conversation.
    optional SmlResponseMetadata metadata = 1 [lazy = true];
    optional BannerType banner_type = 2;
    optional EventType event_type = 3;
  }

  oneof content {
    BotResponse response = 1 [lazy = true];
    UserFeedback user_feedback = 2 [lazy = true];
    ActionInvoked action_invoked = 3 [lazy = true];
    ActionResult action_result = 4 [lazy = true];
    ParseResult parse_result = 5 [lazy = true];
    BotInvoked bot_invoked = 6 [lazy = true];
    SlashAction slash_action = 7 [lazy = true];
    DependencySuggestion dependency_suggestion = 8 [lazy = true];
    HallucinationDetectorResult hallucination_detector_result = 9 [lazy = true];
    QueryBoxEvent query_box_event = 10 [lazy = true];
    ContextDrawerEvent context_drawer_event = 11 [lazy = true];
    ToolCall tool_call = 12 [lazy = true];
    ToolCallFollowUpEvent tool_call_follow_up_event = 13 [lazy = true];
    ToolCallResponse tool_call_response = 14 [lazy = true];
    DeprecationShown deprecation_shown = 15 [lazy = true];
    BotResponseError bot_response_error = 16 [lazy = true];
    SessionManagerEvent session_manager_event = 17 [lazy = true];
    RecentChatsEvent recent_chats_event = 18 [lazy = true];
    ChangesDrawerEvent changes_drawer_event = 19 [lazy = true];
    ConversationActionInvoked conversation_action_invoked = 20 [lazy = true];
    PlanningModeEvent planning_mode_event = 21 [lazy = true];
    TimelineBannerEvent timeline_banner_event = 22 [lazy = true];
  }
}

message GeminiTelemetryEvent {
  // The envelope holds metadata about the event, such as the model ID,
  // provider Id, etc.,
  optional EventEnvelope envelope = 1;

  oneof domain {
    // Server call events, such as requests, responses, etc.
    ServerEvent server_event = 2;
    // UI events holding user interactions, notifications, etc.
    UiEvent ui_event = 3;
    // Events related to the agent, such as tool calls etc.
    AgentEvent agent_event = 4;
  }

  // The envelope holds metadata about the event and information to link related
  // events together.
  // For ServerEvents, the request_id field in the EventEnvelope ties
  // together the request and response events.
  // For all events, the root_trajectory_id in the EventEnvelope
  // ties together events belonging to the same conversation.
  // For all events, the trajectory_id in the EventEnvelope ties together
  // events belonging to the same agent (or sub-agent) interaction.
  message EventEnvelope {
    // Trajectory id of the event.
    optional string trajectory_id = 1;
    // Subagents fill this, empty for top-level trajectories
    optional string parent_trajectory_id = 2;
    // root trajectory_id for this trajectory. Same as conversation_id.
    optional string root_trajectory_id = 3;
    // true if visible in chat history
    optional bool is_chat_thread = 4;

    // Server request/response cycle identifier, used with ServerEvents.
    optional string request_id = 5;
    // Backend trace identifier, used with ServerEvents.
    optional string server_trace_id = 6;

    // Provider ID of the model used for this event.
    optional string model_provider_id = 7;
    // Model ID of the model used for this event.
    optional string model_id = 8;
    // Whether the model is the default model.
    optional bool is_default_model = 9;
  }

  message ServerEvent {
    optional RequestEvent request_event = 1;
    optional ResponseEvent response_event = 2;

    // Captures metrics for a Request in a step.
    message RequestEvent {
      // Number of messages in the history, including the user message and
      // system instructions.
      optional int32 history_message_count = 1;
      // The character length of the system instructions.
      optional int32 system_instruction_length_chars = 2;
      // The total request size in bytes, accounting
      // for the system prompt, tool definitions (including schemas), and the
      // full message history (text, thought blocks, and multimodal content).
      optional int64 request_size_bytes = 3;
    }

    // Captures metrics for a Response in a step.
    message ResponseEvent {
      // Network & Lifecycle
      // HTTP status code of the response.
      optional int32 http_status_code = 1;
      // Latency from the start of the request to the moment it finishes
      // receiving the very last streamed chunk of the response.
      optional int64 latency_ms = 2;
      // Latency from the start of the request to reading the first streamed
      // chunk of the response.
      optional int64 ttfc_ms = 3;  // Time to first streamed chunk
      // Size of the response in bytes.
      optional int64 response_size_bytes = 4;

      // Token Usage
      // The number of tokens in the prompt.
      optional int32 input_token_count = 5;
      // Number of output tokens generated in the response.
      optional int32 output_token_count = 6;
      //  The number of tokens successfully read from the cache.
      optional int32 cache_read_token_count = 7;

      // Model Information
      // The actual model ID that generated the response. This may be different
      // from the model ID requested by the user (e.g., if the user requested a
      // specific version of a model).
      optional string actual_model_id = 8;

      // List from https://ai.google.dev/api/generate-content#FinishReason
      // Represents the semantic reason of why the model stopped generating
      // content.
      enum FinishReason {
        FINISH_REASON_UNSPECIFIED = 0;
        STOP = 1;
        MAX_TOKENS = 2;
        SAFETY = 3;
        RECITATION = 4;
        MISSING_THOUGHT_SIGNATURE = 5;
        LANGUAGE = 6;
        OTHER = 7;
        BLOCKLIST = 8;
        PROHIBITED_CONTENT = 9;
        SPII = 10;
        MALFORMED_FUNCTION_CALL = 11;
        IMAGE_SAFETY = 12;
        IMAGE_PROHIBITED_CONTENT = 13;
        IMAGE_OTHER = 14;
        NO_IMAGE = 15;
        IMAGE_RECITATION = 16;
        UNEXPECTED_TOOL_CALL = 17;
        TOO_MANY_TOOL_CALLS = 18;
        MALFORMED_RESPONSE = 19;
      }
      optional FinishReason finish_reason = 9;

      // Status of the model API call.
      enum ModelApiStatus {
        MODEL_API_STATUS_UNSPECIFIED = 0;
        MODEL_API_STATUS_OK = 1;
        MODEL_API_STATUS_CANCELLED = 2;
        MODEL_API_STATUS_UNKNOWN = 3;
        MODEL_API_STATUS_INVALID_ARGUMENT = 4;
        MODEL_API_STATUS_DEADLINE_EXCEEDED = 5;
        MODEL_API_STATUS_NOT_FOUND = 6;
        MODEL_API_STATUS_ALREADY_EXISTS = 7;
        MODEL_API_STATUS_PERMISSION_DENIED = 8;
        MODEL_API_STATUS_UNAUTHENTICATED = 9;
        MODEL_API_STATUS_RESOURCE_EXHAUSTED = 10;
        MODEL_API_STATUS_CLIENT_SIDE_RATE_LIMIT = 11;
        MODEL_API_STATUS_FAILED_PRECONDITION = 12;
        MODEL_API_STATUS_ABORTED = 13;
        MODEL_API_STATUS_OUT_OF_RANGE = 14;
        MODEL_API_STATUS_UNIMPLEMENTED = 15;
        MODEL_API_STATUS_INTERNAL = 16;
        MODEL_API_STATUS_UNAVAILABLE = 17;
        MODEL_API_STATUS_DATA_LOSS = 18;
        MODEL_API_STATUS_MALFORMED_FUNCTION_CALL = 19;
      }
      optional ModelApiStatus status = 10;
    }
  }

  message UiEvent {
    message ChangesDrawerEvent {
      optional SmlChatBotEvent.ChangeResolved change_resolved = 1;
    }
    optional ChangesDrawerEvent changes_drawer_event = 1;
  }

  message AgentEvent {
    // A single, comprehensive log for the entire tool lifecycle
    optional ToolExecutionSpan tool_execution_span = 1;

    message ToolExecutionSpan {
      // Tool Identity
      optional string tool_name = 1;
      optional string tool_call_id = 2;

      // Timing Metrics
      // Timestamp when the tool execution started.
      optional int64 start_timestamp_ms = 3;
      // computation time
      optional int64 active_ms = 4;
      // Calculates the time from when the model requested the tool until it
      // finished. Includes waiting for user input if any.
      optional int64 total_ms = 5;

      // Execution status of the tool call infrastructure.
      // Tracks the lifecycle of the execution (e.g. if it crashed or was
      // cancelled) rather than the semantic result of the tool itself.
      optional ExecutionStatus execution_status = 6;

      // Semantic outcome of the tool call.
      // While ExecutionStatus tracks if the tool ran, ResponseStatus tracks
      // the logical result (e.g. "file not found" or "build success").
      optional ResponseStatus response_status = 7;

      // Execution status of the tool call infrastructure.
      // Tracks the lifecycle of the execution (e.g. if it crashed or was
      // cancelled) rather than the semantic result of the tool itself.
      enum ExecutionStatus {
        // Status is unknown or not set.
        UNKNOWN_STATUS = 0;
        // The tool infrastructure completed the execution successfully.
        SUCCESS = 1;
        // The execution was interrupted (e.g. by user cancellation or timeout).
        INTERRUPTED = 2;
        // The tool infrastructure encountered an internal error or crash.
        INTERNAL_ERROR = 3;
      }

      // Semantic outcome of the tool call.
      // While ExecutionStatus tracks if the tool ran, ResponseStatus tracks
      // the logical result (e.g. "file not found" or "build success").
      enum ResponseStatus {
        // Status is unknown or not set.
        UNKNOWN_RESPONSE_STATUS = 0;
        // The tool call was successfully executed. Prefer more specific status
        // where possible.
        OK = 1;
        // A generic error occurred during tool execution. Prefer more specific
        // errors where possible.
        ERROR_OCCURRED = 2;
        // The target file was not found.
        ERR_FILE_NOT_FOUND = 3;
        // The target file was not accessible due to permissions or locks.
        ERR_FILE_INACCESSIBLE = 4;
        // The target file is not part of the current project.
        ERR_FILE_NOT_IN_PROJECT = 5;
        // The operation was blocked by AI exclusion rules (e.g. .aiexclude).
        ERR_FILE_BLOCKED_BY_AI_EXCLUDE = 6;
        // Encountered an unexpected IOException when executing the tool call.
        ERR_IO_EXCEPTION = 7;
        // The replacement tool could not find any matches for the provided
        // pattern.
        ERR_REPLACE_TEXT_NO_OCCURRENCES_FOUND_TO_REPLACE = 8;
        // The user rejected the tool's proposed action or change.
        ERR_USER_REJECTED_PROPOSAL = 9;
        // The build process finished successfully.
        BUILD_FINISHED_SUCCESSFULLY = 10;
        // The build process finished but the output contained errors.
        BUILD_FINISHED_WITH_ERRORS = 11;
        // The build process failed to finish (e.g. "Build failed" in output).
        BUILD_FAILED = 12;
        // The build was interrupted before completion.
        BUILD_INTERRUPTED = 13;
        // The Gradle tool could not find any modules in the project.
        GRADLE_ERR_NO_MODULES = 14;
        // The Gradle tool could not run because the project is not an Android
        // project.
        GRADLE_ERR_NOT_ANDROID = 15;
        // The specified Gradle module was not found.
        GRADLE_ERR_MODULE_NOT_FOUND = 16;
        // The specified build artifact was not found.
        GRADLE_ERR_ARTIFACT_NOT_FOUND = 17;
        // The specified build variant was not found.
        GRADLE_ERR_VARIANT_NOT_FOUND = 18;
        // The artifact provided was of a different type than expected by the
        // tool.
        GRADLE_ERR_WRONG_ARTIFACT = 19;
        // Required data for the Gradle operation was missing from the project
        // state.
        GRADLE_ERR_MISSING_DATA = 20;
        // The requested build task was not found.
        BUILD_TASK_NOT_FOUND = 21;
        // A successful response from a sub-agent call. The result is
        // embedded in the response.
        SUB_AGENT_RESULT = 22;
        // The sub-agent terminated without providing a valid response.
        SUB_AGENT_ENDED_WITHOUT_RESPONSE = 23;
        // The arguments provided to the tool call were invalid or malformed.
        ERR_INVALID_ARGUMENTS = 24;
        // The URL provided to the tool call was invalid.
        ERR_INVALID_URL = 25;
        // The file was blocked by AI exclude via a gitignore file.
        ERR_FILE_BLOCKED_BY_GIT_IGNORE = 26;
        // The file critic timed out during analysis returning null as output.
        ERR_FILE_CRITIC_TIMED_OUT = 27;
        // The file is a directory.
        ERR_FILE_IS_DIRECTORY = 28;
        // Invalid line range to read file from.
        ERR_INVALID_LINE_RANGE = 29;
        // The file was modified by someone else since it was last read.
        ERR_FILE_MODIFIED_BY_SOMEONE_ELSE = 30;
        // The tool call was malformatted or invalid.
        MALFORMATTED_TOOL_CALL = 31;
        // The tool execution was interrupted. Used by the shell command tool.
        TOOL_EXECUTION_INTERRUPTED = 32;
      }

      // Tool-Specific Metadata
      oneof tool_specific_metadata {
        // Data for a find_declaration tool call.
        FindDeclarationToolCallData find_declaration_tool_call_data = 8;
        // Data for a find_files tool call.
        FindFilesToolCallData find_files_tool_call_data = 9;
        // Data for a find_usages tool call.
        FindUsagesToolCallData find_usages_tool_call_data = 10;
        // Data for a grep tool call.
        GrepToolCallData grep_tool_call_data = 11;
        // Data for a code_search tool call.
        RagToolCallData rag_tool_call_data = 12;
        // Data for a read_file tool call.
        ReadFileToolCallData read_file_tool_call_data = 13;
      }

      message SearchArguments {
        // Number of lines to show after the match (like grep -A).
        optional int32 lines_after = 1;
        // Number of lines to show before the match (like grep -B).
        optional int32 lines_before = 2;
        // Number of lines to show around the match (like grep -C).
        optional int32 lines_context = 3;
        // Pattern to filter results (like grep -E).
        optional string filter = 4;
        // Type to search, e.g., "all" kinds, function "call", etc.
        optional string type = 5;
        // Glob-like patterns to filter in results.
        optional string include_pattern = 6;
        // Glob-like patterns to filter out results.
        optional string exclude_pattern = 7;
      }

      message SearchResponse {
        // The number of characters in the final response.
        optional int32 response_length = 1;
        // The number of characters in the search results before path
        // deduplication.
        optional int32 raw_result_length = 2;
      }

      message FindDeclarationToolCallData {
        // The exception the find_declaration tool encountered.
        optional string exception = 1;
        // The number of files in the find_declaration.
        optional int32 result_count = 2;
        // The search arguments used for find_declaration.
        optional SearchArguments search_arguments = 3;
        // The search response.
        optional SearchResponse response = 4;
      }

      message FindFilesToolCallData {
        // Comma separated exceptions from the find_files tool call.
        // We will use "IndexerInactive" to indicate the indexer is not active.
        optional string exception = 1;
        // The number of files in the combined file search result.
        optional int32 combined_result_count = 2;
        // The number of files in the bm25 file search result.
        optional int32 bm25_search_count = 3;
        // The number of files in the original find_files search result.
        optional int32 found_files_count = 4;
        // The number of docs (a doc is a file in the current RAG indexer) that
        // are indexed.
        optional int32 total_indexed_docs = 5;
        // The search response.
        optional SearchResponse response = 6;
      }

      message FindUsagesToolCallData {
        // The exception the find_usages tool encountered.
        optional string exception = 1;
        // The number of files in the find_usages.
        optional int32 result_count = 2;
        // The search arguments used for find_usages.
        optional SearchArguments search_arguments = 3;
        // The search response.
        optional SearchResponse response = 4;
      }

      message GrepToolCallData {
        // The number of files in the grep result.
        optional int32 result_count = 1;
        // Whether the query contains any regex of ".*+?^$|(){}" or not.
        optional bool regex_query = 2;
        // The number of files in the grep BM25 backend result.
        optional int32 bm25_result_count = 3;
        // The number of files in the original grep backend result.
        optional int32 grep_result_count = 4;
        // The number of docs (a doc is a file in the current RAG indexer) that
        // are indexed.
        optional int32 total_indexed_docs = 5;
        // The search arguments used for grep.
        optional SearchArguments search_arguments = 6;
        // The search response.
        optional SearchResponse response = 7;
      }

      message RagToolCallData {
        // The exception the code_search encountered.
        // We will use "IndexerInactive" to indicate the indexer is not active.
        optional string exception = 1;
        // The number of files in code_search.
        optional int32 result_count = 2;
        // The number of resource files code_search returned.
        optional int32 resource_count = 3;
        // The number of files from out/ and builds/ that code_search returned.
        optional int32 generated_files = 4;
        // The number of docs (a doc is a file in the current RAG indexer) that
        // are indexed.
        optional int32 total_indexed_docs = 5;
        // The search response.
        optional SearchResponse response = 6;
      }

      message ReadFileToolCallData {
        // Indicates if the read tool call read a skill file.
        optional bool is_skill_file = 1;
        // The name of the skill if it's a bundled skill.
        optional SkillsEvent.SkillName skill_name = 2;
      }
    }
  }
}

message SmlConfigurationEvent {
  // Whether SML features are available to this user.
  optional bool sml_available = 1;

  // Whether this user has started Studio Bot onboarding.
  optional bool bot_onboarding_started = 4;

  // Whether this user has completed Studio Bot onboarding.
  optional bool bot_onboarding_completed = 5;

  // User has ML completion enabled.
  optional bool completion_enabled = 2;

  // User has ML based fixes enabled.
  optional bool transform_enabled = 3;

  // User agrees to sending project context with queries
  optional bool project_context_enabled = 6;

  // Deprecated. The existing SmlProductVariant was a combined enum to identify
  // both user account type and license type. Use UserAccountType and
  // LicenseType instead. The product variant that was fetched by the
  // LoadCodeAssist API
  optional SmlProductVariant product_variant = 7 [deprecated = true];

  // User has auto-approve enabled for tool calls in agent mode
  optional bool agent_auto_accept_enabled = 8;

  // details.
  optional string tier_name = 9;

  // The license type that was fetched by the LoadCodeAssist API.
  optional LicenseType license_type = 10;

  // The user account type that was fetched by the LoadCodeAssist API.
  optional UserAccountType user_account_type = 11;

  // The tier ID of the onboarded user.
  optional string tier_id = 12;

  // Timestamp in ms. Can be used by various configuration events (for instance
  // onboarding completion time)
  optional int64 configuration_time_ms = 13;

  enum SmlProductVariant {
    PRODUCT_VARIANT_UNKNOWN = 0;
    PRODUCT_VARIANT_FREE = 1;
    PRODUCT_VARIANT_BUSINESS = 2;
    PRODUCT_VARIANT_DASHER_USER_CHOICE = 3 [deprecated = true];
    PRODUCT_VARIANT_DASHER_FREE = 4;
    PRODUCT_VARIANT_DASHER_BUSINESS = 5;
  }

  enum UserAccountType {
    USER_ACCOUNT_TYPE_UNKNOWN = 0;
    USER_ACCOUNT_TYPE_CONSUMER = 1;
    USER_ACCOUNT_TYPE_DASHER = 2;
  }

  enum LicenseType {
    LICENSE_TYPE_UNKNOWN = 0;
    LICENSE_TYPE_CONSUMER = 1;
    LICENSE_TYPE_BUSINESS = 2;
  }
}

message SmlAiExcludeEvent {
  // Paste into chat
  optional bool paste_blocked = 1;

  // Editor actions (e.g. document, simplify)
  optional bool intention_action_blocked = 2;

  // Passive editor effects/actions (e.g. transform)
  optional bool passive_action_blocked = 3;

  // Code included as context for a query
  optional bool context_blocked = 4;
}

message SmlGeolocationEvent {
  optional string model_id = 1;
  optional bool check_successful = 2;
  optional int32 grpc_error_response_code = 3;
}

message SmlCompletionRequestErrorEvent {
  optional string model_id = 1;
  optional int32 grpc_error_response_code = 3;
}

// Event for metrics related to Retrieval Augmented Generation (RAG).
message SmlRagEvent {
  message SearchArguments {
    // Number of lines to show after the match (like grep -A).
    optional int32 lines_after = 1;
    // Number of lines to show before the match (like grep -B).
    optional int32 lines_before = 2;
    // Number of lines to show around the match (like grep -C).
    optional int32 lines_context = 3;
    // Pattern to filter results (like grep -E).
    optional string filter = 4;
    // Type to search, e.g., "all" kinds, function "call", etc.
    optional string type = 5;
    // Glob-like patterns to filter in results.
    optional string include_pattern = 6;
    // Glob-like patterns to filter out results.
    optional string exclude_pattern = 7;
  }

  message SearchResponse {
    // The number of characters in the final response.
    optional int32 response_length = 1;
    // The number of characters in the search results before path deduplication.
    optional int32 raw_result_length = 2;
  }

  message RagIndexerMetrics {
    // The type of indexer like "bm25" or "embeddings" and its version.
    optional string indexer_type = 1;
    optional int32 index_version = 2;
    // The exception it encountered during RAG indexing.
    optional string index_exception = 3;
    // The number of indexed files.
    optional int32 indexed_files = 4;
    // The number of indexed Kotlin/Java files.
    optional int32 indexed_kt_files = 5;
    optional int32 indexed_java_files = 6;
    // The number of indexed files from out/ and builds/.
    optional int32 generated_files = 7;
    // The time in milliseconds to index
    optional int64 indexing_time_ms = 8;
  }

  message RagToolMetrics {
    // The exception the code_search encountered.
    // We will use "IndexerInactive" to indicate the indexer is not active.
    optional string search_exception = 1;
    // The number of files in code_search
    optional int32 result_count = 2;
    // The number of resource files code_search returned.
    optional int32 resource_count = 3;
    // The number of files from out/ and builds/ that code_search returned.
    optional int32 generated_files = 4;
    // The time in milliseconds for code_search.
    optional int64 search_time_ms = 5;
    // The number of docs (a doc is a file in the current RAG indexer) that are
    // indexed.
    optional int32 total_indexed_docs = 6;
    // The search response.
    optional SearchResponse response = 7;
  }

  message FindDeclarationMetrics {
    // The exception the find_declaration tool encountered.
    optional string exception = 1;
    // The number of files in the find_declaration.
    optional int32 result_count = 2;
    // The time in milliseconds for find_declaration.
    optional int64 find_declaration_time_ms = 3;
    // The search arguments used for find_declaration.
    optional SearchArguments search_arguments = 4;
    // The search response.
    optional SearchResponse response = 5;
  }

  // We merged the original find_files with file path search based on BM25.
  // "find_files result" means the file search result of the original
  // find_files. "bm25 file search" means the file search result based on BM25.
  message FindFileMetrics {
    // Comma separated exceptions from the BM25 find_files tool call like
    // "java.io.FileNotFoundException,java.io.IOException,IndexerInactive".
    // We will use "IndexerInactive" to indicate the indexer is not active.
    optional string find_files_exception = 1;
    // The number of files in the combined file search result.
    optional int32 combined_result_count = 2;
    // The number of files in the bm25 file search result.
    optional int32 bm25_search_count = 3;
    // The number of files in the original find_files search result.
    optional int32 found_files_count = 4;
    // The number of docs (a doc is a file in the current RAG indexer) that are
    // indexed.
    optional int32 total_indexed_docs = 5;
    // The search response.
    optional SearchResponse response = 6;
  }

  message FindUsagesMetrics {
    // The exception the find_usages tool encountered.
    optional string exception = 1;
    // The number of files in the find_usages.
    optional int32 result_count = 2;
    // The time in milliseconds for find_usages.
    optional int64 find_usages_time_ms = 3;
    // The search arguments used for find_usages.
    optional SearchArguments search_arguments = 4;
    // The search response.
    optional SearchResponse response = 5;
  }

  message GrepMetrics {
    // The number of files in the grep result.
    optional int32 result_count = 1;
    // Whether the query contains any regex of ".\*+?^$|(){}" or not.
    optional bool regex_query = 2;
    // The number of files in the grep BM25 backend result.
    optional int32 bm25_result_count = 3;
    // The number of files in the original grep backend result.
    optional int32 grep_result_count = 4;
    // The number of docs (a doc is a file in the current RAG indexer) that are
    // indexed.
    optional int32 total_indexed_docs = 5;
    // The search arguments used for grep.
    optional SearchArguments search_arguments = 6;
    // The search response.
    optional SearchResponse response = 7;
  }

  message KbRagIndexerMetrics {
    // The exception that occurred during KB RAG indexing.
    optional string index_exception = 1;

    // The time in milliseconds to index.
    optional int64 indexing_time_ms = 2;

    // Whether it indexed the downloaded docs (from Lorry) or not.
    optional bool index_downloaded_docs = 3;
  }

  message LuceneIndexMetrics {
    message UpdateStats {
      // The number of update operations that have been applied to the index
      // since the last flush.
      optional int32 update_count = 1;
      // The amount of CPU time, in milliseconds, that all update operations
      // spent waiting to begin execution since the last flush.
      optional int64 index_queue_time_ms = 2;
      // The amount of CPU time, in milliseconds, that all update operations
      // spent executing since the last flush.
      optional int64 index_write_time_ms = 3;
    }

    // The type of the active RAG indexer (see RagIndexerMetrics)
    optional string indexer_type = 1;
    // Whether the RAG indexer that owns this index is the active RAG indexer.
    optional bool is_active = 2;
    // Stats for all changes applied to the index since the last flush.
    optional UpdateStats overall_stats = 3;
    // The amount of wall time, in milliseconds, that the current flush
    // operation spent waiting for pending writes to finish.
    optional int64 index_flush_time_ms = 4;
    // The amount of wall time, in milliseconds, that the current flush
    // operation spent waiting for Lucene to commit the index to disk.
    optional int64 index_commit_time_ms = 5;
    // Stats for the update operations that have been applied to the index since
    // the last flush, broken down by the IntelliJ file type. Key is the unique
    // name of the file type, as reported by FileType#getName.
    map<string, UpdateStats> stats_by_file_type = 6;
    // Stats for the update operations that have been applied to the index since
    // the last flush, broken down by the base language. Key is the unique ID of
    // the language, as reported by Language#getId. Since languages can have
    // dialects and base languages, the total count in this map may differ from
    // the total count in overall_stats.
    map<string, UpdateStats> stats_by_language = 7;
    // The total number of documents in the index, across all projects.
    optional int32 index_document_count = 8;
    // The total size of the index on disk, across all projects.
    optional int64 index_size_bytes = 9;
  }

  message IntellijScanMetrics {
    // The type of the active RAG indexer (see RagIndexerMetrics)
    optional string indexer_type = 1;
    // The number of files scanned in this scan pass.
    optional int32 files_scanned = 2;
    // The amount of CPU time, in milliseconds, to perform the full scan pass.
    // Includes vfs_iteration_time, file_status_check_time, and overhead.
    optional int64 total_scan_time_ms = 3;
    // The amount of CPU time, in milliseconds, to iterate the VFS during
    // scanning.
    optional int64 vfs_iteration_time_ms = 4;
    // The amount of CPU time, in milliseconds, to check the statuses of files
    // during indexing. Slowdowns in index filters will appear here.
    optional int64 file_status_check_time_ms = 5;
    // The amount of wall time, in milliseconds, that the scanning pass spent in
    // dumb mode.
    optional int64 dumb_mode_time_ms = 6;
    // The amount of wall time, in milliseconds, that the scanning pass spent
    // paused.
    optional int64 paused_time_ms = 7;
  }

  message IntellijIndexMetrics {
    // The type of the RAG indexer that owns this index (see RagIndexerMetrics)
    optional string indexer_type = 1;
    // The number of files indexed by the RAG indexer in this index pass.
    optional int32 files_indexed = 2;
    // The total number of bytes indexed by the RAG indexer in this index pass.
    optional int64 bytes_indexed = 3;
    // The amount of CPU time, in milliseconds, that the RAG indexer spent
    // generating updated index values during this index pass.
    optional int64 index_evaluation_time_ms = 4;
    // The amount of wall time, in milliseconds, that the indexing pass spent in
    // dumb mode.
    optional int64 dumb_mode_time_ms = 5;
    // The amount of wall time, in milliseconds, that the indexing pass spent
