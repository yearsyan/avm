// Metrics for Play Publishing
message PlayPublishingEvent {
  enum PlayPublishingEventType {
    UNKNOWN_EVENT = 0;
    // Events related to showing the Play Publishing wizard.
    WIZARD_SHOWN = 1;
    // Events related to choosing a bundle to upload.
    CHOOSE_BUNDLE = 2;
    // Events related to creating an app record on Google Play.
    CREATE_APP = 3;
    // Events related to creating a release on Google Play.
    CREATE_RELEASE = 4;
  }

  message WizardShownDetails {
    enum WizardInvocationSource {
      UNKNOWN_INVOCATION_SOURCE = 0;
      // The wizard was invoked from the Export Signed Package wizard.
      EXPORT_SIGNED_PACKAGE_WIZARD = 1;
      // The wizard was invoked from the Build menu.
      BUILD_MENU = 2;
    }
    optional WizardInvocationSource invocation_source = 1;
  }

  message ChooseBundleDetails {
    // Whether the package name is registered on Google Play.
    optional bool package_registered = 1;
    // Whether the app name was read from the bundle.
    optional bool app_name_read = 2;
    // Whether the package name was read from the bundle.
    optional bool package_name_read = 3;
    // Whether the version code was read from the bundle.
    optional bool version_code_read = 4;
    // Whether the version name was read from the bundle.
    optional bool version_name_read = 5;
  }

  message CreateAppDetails {
    enum CreateAppResult {
      UNKNOWN_CREATE_APP_RESULT = 0;
      // App creation succeeded.
      SUCCESS = 1;
      // The package name is not available.
      FAILED_PACKAGE_NAME_NOT_AVAILABLE = 2;
      // No developer accounts were found.
      FAILED_NO_DEVELOPER_ACCOUNTS = 3;
      // Failed to list developer accounts.
      FAILED_LIST_DEVELOPER_ACCOUNTS_FAILED = 4;
    }

    // Result of the app creation attempt.
    optional CreateAppResult create_app_result = 1;
  }

  message CreateReleaseDetails {
    enum CreateReleaseResult {
      UNKNOWN_CREATE_RELEASE_RESULT = 0;
      // Release creation succeeded.
      SUCCESS = 1;
      // Failed to list tracks.
      FAILED_TO_LIST_TRACKS = 2;
      // Bundle with version code already uploaded.
      FAILED_VERSION_CODE_ALREADY_EXISTS = 3;
      // Failed to upload the bundle.
      FAILED_TO_UPLOAD_BUNDLE = 4;
      // Release is not allowed on the track.
      FAILED_RELEASE_NOT_ALLOWED_ON_TRACK = 5;
      // Bundle was signed with the wrong key.
      FAILED_BUNDLE_SIGNED_WITH_WRONG_KEY = 6;
      // User cancelled the upload.
      FAILED_USER_CANCELLED = 7;
      // Failed to create the release.
      FAILED_TO_CREATE_RELEASE = 8;
      // Failed to commit the release.
      FAILED_TO_COMMIT_RELEASE = 9;
    }

    enum TrackType {
      UNKNOWN_TRACK_TYPE = 0;
      // The release was created for the internal track.
      INTERNAL_TESTING = 1;
      // The release was created for the alpha track.
      ALPHA = 2;
      // The release was created for the beta track.
      BETA = 3;
      // The release was created for the production track.
      PRODUCTION = 4;
      // The release was created for a custom track.
      CUSTOM = 5;
    }

    // Result of the release creation attempt.
    optional CreateReleaseResult create_release_result = 1;
    // The track type of the release.
    optional TrackType track_type = 2;
    // Time to upload the bundle in milliseconds.
    optional int32 time_to_upload_bundle_ms = 3;
  }

  optional PlayPublishingEventType event_type = 1;
  // set when event_type is WIZARD_SHOWN.
  optional WizardShownDetails wizard_shown_details = 2 [lazy = true];
  // set when event_type is CHOOSE_BUNDLE.
  optional ChooseBundleDetails choose_bundle_details = 3 [lazy = true];
  // set when event_type is CREATE_APP.
  optional CreateAppDetails create_app_details = 4 [lazy = true];
  // set when event_type is CREATE_RELEASE.
  optional CreateReleaseDetails create_release_details = 5 [lazy = true];
}

// Telemetry event for the Change Review feature.
message ChangeReviewEvent {
  // The entry point in the UI from which the Change Review was invoked.
  enum EntryPoint {
    UNKNOWN_ENTRY_POINT = 0;
    PENDING_CHANGES = 1;
    COMMIT_HISTORY = 2;
    AGENT_DRAWER = 3;
    // The session was restored from a previously saved state.
    RESTORED = 4;
  }

  // The final outcome status of the Change Review generation session.
  enum Status {
    UNKNOWN_STATUS = 0;
    COMPLETED = 1;
    FAILED = 2;
    CANCELLED = 3;
  }

  // Telemetry data for a single Change Review generation session.
  message Session {
    optional string session_id = 1;
    optional EntryPoint entry_point = 2;
    optional string model_id = 3;
    optional Status status = 4;
    optional int64 total_duration_ms = 5;
    optional int64 analysis_duration_ms = 6;
    optional int64 summary_duration_ms = 7;
    optional int64 themes_duration_ms = 8;
    optional int64 theme_details_duration_ms = 9;
    optional int32 num_files = 10;
    optional int32 num_chunks = 11;
    optional int32 num_suggestions_generated = 12;
    optional string failure_reason = 13;
  }

  message FixBatch {
    optional string session_id = 1;
    optional int32 num_suggestions_selected = 2;
    optional int32 num_suggestions_successful = 3;
    optional int32 num_suggestions_failed = 4;
    optional int64 total_duration_ms = 5;
  }

  oneof event {
    // Logged when a change review generation session ends.
    Session session = 1;
    // Logged when a batch of suggested fixes is applied.
    FixBatch fix_batch = 2;
  }
}
