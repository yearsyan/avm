}

// Event describing the duration from the user starting IDE till having single
// project opened without Welcome Screen involved, and the editors in project
// are reopened, or it's found that there are no editors to open. Does not wait
// for highlighting/indexing/other initialization activities to finish.
message StartupPerformanceCodeLoadedAndVisibleInEditor {
  // How long did it take to load the code and show it in the editor.
  optional uint32 duration_ms = 1;
  // Type of the file opened.
  optional string file_type = 2;
  // Shows if the opened project has settings to filter cases of importing which
  // may need more resources.
  optional bool has_settings = 3;
  // While opening the file, the markup was loaded from the cache.
  optional bool loaded_cached_markup = 4;
  // No editors were opened on the IDE startup.
  optional bool no_editors_to_open = 5;
  // The reason why the selected editor was opened.
  optional SourceOfSelectedEditor source_of_selected_editor = 6;

  enum SourceOfSelectedEditor {
    UNKNOWN_SOURCE_OF_SELECTED_EDITOR = 0;
    // A regular text editor was opened.
    TEXT_EDITOR = 1;
    // README.md file was found in the project and opened as a default.
    FOUND_README_FILE = 2;
  }
}

// Events raised by user interactions with UI Tools preferences panel
message UiToolsPreferencesEvent {
  // Type of the view modes to show resources and code in the UI Tools.
  // Can show code, design and a split view showing both code and design
  enum ViewMode {
    UNKNOWN_VIEW_MODE = 0;
    CODE = 1;
    SPLIT = 2;
    DESIGN = 3;
  }

  // Type of layout used when showing a Preview in a file, it can show a preview
  // organized on a grid layout, in a vertical list or gallery
  // mode where only a preview at a time is shown.
  enum LayoutMode {
    UNKNOWN_LAYOUT_MODE = 0;
    GRID = 1;
    LIST = 2;
    GALLERY = 3;
  }

  // Type of resource usage when using a Preview, essential is using the minimum
  // possible resources to show the preview, default uses a regular amount of
  // resources, resource usages can be a bit higher when default is enabled
  // along with live updates
  enum ResourceUsage {
    DEFAULT = 0;
    DEFAULT_WITHOUT_LIVE_UPDATES = 1;
    ESSENTIAL = 2;
  }

  // View mode of the first opening of resources files. It can be code, split or
  // design
  optional ViewMode resources_view_mode = 1;

  // Kotlin files view mode can be code, split or design
  optional ViewMode editor_view_mode = 2;

  // When true, it always shows the split mode whenever a code file contains
  // @Preview annotations
  optional bool show_split_mode_on_annotations = 3;

  // The percentage of sensitivity level of the Trackpad, the value is in an
  // interval between 0 and 100
  optional int32 track_pad_sensitivity_level = 4;

  // The layout mode of previews when its file is opened for the first time, it
  // can be grid, list, or gallery.
  optional LayoutMode preview_layout_mode = 6;

  // Amount or resources used to show previews: can be default, default without
  // live updates or essential
  optional ResourceUsage resource_usage = 7;
}

