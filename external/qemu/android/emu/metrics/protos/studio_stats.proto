message AdbUsageEvent {
  oneof event {
    JdwpProcessPropertiesCollectorEvent process_properties_event = 1
        [lazy = true];
    AdbDeviceStateChangeEvent device_state_change_event = 2 [lazy = true];
    AppInfoProcessPropertiesCollectorEvent app_info_process_properties_event = 3
        [lazy = true];
    // Add other types of events, e.g. attaching debugger, etc
  }

  message AdbDeviceStateChangeEvent {
    enum DeviceState {
      DEVICE_STATE_UNSPECIFIED = 0;

      // Other than the state type listed below
      OTHER = 1;

      BOOTLOADER = 2;
      AUTHORIZING = 3;
      CONNECTING = 4;
      OFFLINE = 5;
      ONLINE = 6;
      DISCONNECTED = 7;
    }

    // Current device state
    optional DeviceState device_state = 1;

    // Previously recorded device state
    optional DeviceState previous_device_state = 2;

    // Time since last online in milliseconds.
    // Note that since we use a serial number to identify the device we may get
    // a misleading value for anything other than a local physical devices (e.g.
    // emulator serial number like `emulator-5554` can be reused).
    optional int64 last_online_ms = 3;
  }

  message JdwpProcessPropertiesCollectorEvent {
    // Whether the collection is successful
    optional bool success = 1;

    // If failed then the type of failure
    enum FailureType {
      FAILURE_TYPE_UNSPECIFIED = 0;

      // No response (handshake) when trying to use a `jdwp:<pid>` command
      // to send HELO and FEAT commands
      NO_RESPONSE = 1;

      // Properties collection failed with ClosedChannelException
      CLOSED_CHANNEL_EXCEPTION = 2;

      // Error like:
      // 'closed' error on device serial #emulator-5554 executing service
      // 'jdwp:29038'
      //  at
      //  com.android.adblib.impl.services.AdbServiceRunner.readFailResponseAndThrow
      CONNECTION_CLOSED_ERROR = 3;

      // Other `IOException`
      IO_EXCEPTION = 5;

      // All other errors
      OTHER_ERROR = 4;
    }
    optional FailureType failure_type = 2;

    // If a property collection previously failed, specifies how many times it
    // happened
    optional int32 previously_failed_count = 3;

    // If a property collection previously failed, specifies the type of the
    // last failure
    optional FailureType previous_failure_type = 4;
  }

  message AppInfoProcessPropertiesCollectorEvent {
    // The type of event
    enum EventType {
      EVENT_TYPE_UNSPECIFIED = 0;

      // We collected process value using track-app service
      TRACK_APP_VALUE_COLLECTED = 1;

      // We retrieved a VmInfo value
      VM_INFO_VALUE_COLLECTED = 2;

      // track-app service encountered an error
      TRACK_APP_IO_EXCEPTION = 3;

      // track-app service encountered an error
      TRACK_APP_OTHER_EXCEPTION = 4;

      // Failed to get a VmInfo value
      VM_INFO_IO_EXCEPTION = 5;

      // Failed to get a VmInfo value
      VM_INFO_OTHER_EXCEPTION = 6;
    }
    optional EventType event_type = 1;
  }
}

