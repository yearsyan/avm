// Event related to finishing of the DaemonCodeAnalyzer iteration.
// DaemonCodeAnalyzer manages the background highlighting and auto-import
// for files displayed in editors.
message DaemonCodeAnalyzerFinishedEvent {
  // Daemon highlighting segment duration until it was finished or restarted for
  // some reason.
  optional uint64 segment_duration_ms = 1;
  // Full highlighting duration since the file was modified and/or dumb mode
  // status changed. It should be equal to the sum of segments.
  optional uint64 full_duration_since_started_ms = 2;
  // Number of errors found by the DaemonCodeAnalyzer.
  optional uint32 errors = 3;
  // Number of warnings found by the DaemonCodeAnalyzer.
  optional uint32 warnings = 4;
  // Total number of lines analyzed by the DaemonCodeAnalyzer.
  optional uint32 lines = 5;
  // Type of the file that was analyzed.
  optional string file_type = 6;
  // Was the highlighting completed.
  optional bool highlighting_completed = 7;
  // Did the iteration happened while the IDE was in the dumb mode.
  optional bool dumb_mode = 8;
}

// Event containing metrics about the editing process and changes to files.
message EditingMetricsEvent {
  optional CharacterMetrics character_metrics = 1;
  optional QuickDocEvent quick_doc_event = 2;
  optional ExternalQuickDocEvent external_quick_doc_event = 3;

  message CharacterMetrics {
    repeated SourceCount chars_added = 1;
    repeated SourceCount chars_deleted = 2;
    // Duration of period during which the metrics were collected, in
    // milliseconds.
    optional uint64 duration_ms = 3;

    enum Source {
      UNKNOWN = 0;
      // User modified the file by typing.
      TYPING = 1;
      // The IDE took an action that modified a file.
      IDE_ACTION = 2;
      // The user pasted text into a file.
      PASTE = 3;
      // The user used the IDE to refactor code.
      REFACTORING = 4;
      // The user accepted a deterministic IDE-generated code completion.
      CODE_COMPLETION = 5;
      // The user accepted an AI-generated code completion suggestion.
      AI_CODE_COMPLETION = 6;
      // The user accepted an AI-generated code transformation suggestion.
      AI_CODE_TRANSFORMATION = 7;
      // The user pasted text from an AI chat window into the file.
      PASTE_FROM_AI_CHAT = 8;
    }

    message SourceCount {
      optional Source source = 1;
      optional uint64 count = 2;
    }
  }

  // Event containing metrics about quick documentation shown for all
  // DocumentationTargets.
  message QuickDocEvent {
    // The type of file that the quick doc was shown for.
    optional EditorFileType file_type = 1;
    // The amount oftime the quick doc was shown to the user.
    optional uint64 shown_duration_ms = 2;
  }

  // Event containing metrics about quick documentation requiring communication
  // with an external server.
  message ExternalQuickDocEvent {
    // The type of file that the quick doc was shown for.
    optional EditorFileType file_type = 1;
    // The time it took to fetch the documentation from the server.
    optional uint64 fetch_duration_ms = 2;
    // The fetch was successful.
    optional bool success = 3;
    // Our local cache had a fresh copy of the documentation.
    optional bool cache_hit = 4;
    // The server returned a 304 ("Not Modified") response, so we used the
    // cached copy, even if it was otherwise stale. (If this is true, but
    // success is false, it means the server returned a 304, but we did not have
    // a cached copy.)
    optional bool server_not_modified = 5;
    // How many bytes were fetched from the server.
    optional uint64 num_bytes_fetched = 6;
    // How many bytes were cached in the local cache as a result of this fetch.
    optional uint64 num_bytes_cached = 7;
    // How many bytes were actually displayed to the user.
    optional uint64 num_bytes_displayed = 8;
  }
}

