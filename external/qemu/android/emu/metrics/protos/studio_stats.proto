  enum LayoutEditorEventType {
    UNKNOWN_EVENT_TYPE = 0;

    RENDER = 1;

    ZOOM_IN = 2;
    ZOOM_OUT = 3;
    ZOOM_FIT = 4;
    ZOOM_ACTUAL = 5;

    SHOW_PAN_AND_ZOOM = 6;
    SHOW_LINT_MESSAGES = 7;
    LINT_TOOLTIP = 8;

