// This event is logged once when the wizard is either finished or canceled and
// contains the summary of what happened during the wizard.
message SetupWizardEvent {
  // The various wizard entry points.
  enum SetupWizardMode {
    UNKNOWN_MODE = 0;
    NEW_INSTALL = 1;
    MISSING_SDK = 2;
    INSTALL_HANDOFF = 3;
    AEHD_WIZARD = 4;
    SDK_SETUP = 5;
  }

  // Whether the wizard was finished or canceled.
  enum CompletionStatus {
    UNKNOWN_STATUS = 0;
    FINISHED = 1;
    CANCELED = 2;
  }

  // A wizard step together with the time spent in it.
  message WizardStep {
    enum WizardStepKind {
      UNKNOWN_STEP = 0;
      WELCOME = 1;
      MISSING_SDK_ALERT = 2;
      INSTALL_TYPE = 3;
      SDK_COMPONENTS = 4;
      INSTALL_SUMMARY = 5;
      LICENSE_AGREEMENT = 6;
      LINUX_KVM_INFO = 7;
      INSTALL_SDK = 8;
      AEHD_INSTALL_INFO = 9;
      AEHD_UNINSTALL_INFO = 10;
    }

    optional WizardStepKind wizard_step_kind = 1;
    optional int64 time_spent_in_step_ms = 2;
  }

  // Whether the user selected the standard or custom installation mode.
  enum InstallationMode {
    UNKNOWN_INSTALLATION_MODE = 0;
    STANDARD = 1;
    CUSTOM = 2;
  }

  // Metrics related to the SDK installation step.
  message SdkInstallationMetrics {
    // The kinds of SDK components that can be installed.
    enum SdkComponentKind {
      UNKNOWN_COMPONENT = 0;
      ANDROID_PLATFORM = 1;
      ANDROID_SDK = 2;
      ANDROID_VIRTUAL_DEVICE = 3;
      AEHD = 4;
    }

    // The result of the SDK installation step, i.e. whether the user
    // successfully installed the SDK, canceled the installation, or encountered
    // an error.
    enum SdkInstallationResult {
      UNKNOWN_INSTALLATION_RESULT = 0;
      SUCCESS = 1;
      ERROR = 2;
      CANCELED = 3;
    }

    // Whether the user changed the SDK install location.
    optional bool sdk_install_location_changed = 1;

    // The kind of SDK components that were configured to be installed.
    repeated SdkComponentKind sdk_components_to_install = 2 [packed = true];

    // The result of the SDK installation step.
    optional SdkInstallationResult sdk_installation_result = 3;

    // The time it took to install the SDK components; includes the time it took
    // to download the components.
    optional int64 time_spent_installing_sdk_components_ms = 4;
  }

  // The entry point to the wizard.
  optional SetupWizardMode mode = 1;

  // Whether the wizard was finished or canceled.
  optional CompletionStatus completion_status = 2;

  // The total time spent in the wizard.
  optional int64 time_spent_in_wizard_ms = 3;

  // The steps in the wizard, in the order they were shown.
  repeated WizardStep wizard_steps = 4;

  // Whether the user selected the standard or custom installation mode.
  optional InstallationMode installation_mode = 5;

  // Metrics related to the SDK installation step.
  optional SdkInstallationMetrics sdk_installation_metrics = 6;

  // Whether the deprecated wizard was used.
  optional bool is_deprecated_wizard = 7;
}

