// Event for capturing skills metrics.
message SkillsEvent {
  // Common metadata for all skills events.
  optional SmlResponseMetadata metadata = 1 [lazy = true];

  oneof event {
    Activation activation = 2 [lazy = true];
    Discovery discovery = 3 [lazy = true];
  }

  // Details about the skill activated by the agent.
  message Activation {
    optional SkillType type = 1;
    // Status of reading skill file.
    optional SmlChatBotEvent.ToolCallResponseStatus status = 2;
    // Name of the pre-built skill being activated.
    optional SkillName skill_name = 3;
  }

  // Metrics for discovering and parsing skills.
  message Discovery {
    // Latency in milliseconds for finding and reading skill definition files.
    optional int64 latency_ms = 1;
    // Number of skills successfully parsed.
    optional int32 parsed_successful_count = 2;
    // Number of skills that failed to parse.
    optional int32 parsed_failed_count = 3;
    // Token count of parsed skills.
    optional int64 token_count = 4;
  }

  // The type of skill.
  enum SkillType {
    UNKNOWN = 0;
    // Curated skills from DAC.
    PRE_BUILT = 1;
    // Local project skills directory.
    USER_DEFINED = 2;
  }

  // Pre-built skill names.
  enum SkillName {
    UNKNOWN_SKILL_NAME = 0;
    CAMERA1_TO_CAMERAX = 1;
    APPFUNCTIONS = 2;
    ANDROID_CLI = 3;
    FIREBASE_AUTH_BASICS = 4;
    FIREBASE_BASICS = 5;
    VERIFIED_EMAIL = 6;
    ADAPTIVE = 7;
    MIGRATE_XML_VIEWS_TO_JETPACK_COMPOSE = 8;
    STYLES = 9;
    NAVIGATION3 = 10;
    R8_ANALYZER = 11;
    ENGAGE_SDK_INTEGRATION = 12;
    PLAY_BILLING_LIBRARY_VERSION_UPGRADE = 13;
    PERFETTO_SQL = 14;
    PERFETTO_TRACE_ANALYSIS = 15;
    EDGE_TO_EDGE = 16;
    TESTING_SETUP = 17;
    DISPLAY_GLASSES_WITH_JETPACK_COMPOSE_GLIMMER = 18;
  }
}

