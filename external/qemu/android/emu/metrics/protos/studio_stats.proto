//     and user is notified.
message DevServiceDeprecationInfo {
  enum DeprecationStatus {
    UNKNOWN_STATUS = 0;
    // The dev service is not supported by the current version of Studio
    UNSUPPORTED = 1;
    // The dev service is deprecated and will soon be UNSUPPORTED
    DEPRECATED = 2;
  }

  enum DeliveryType {
    UNKNOWN_DELIVERY_TYPE = 0;
    // A notification was shown to the user
    NOTIFICATION = 1;
    // A banner was shown to the user
    BANNER = 2;
    // A panel was shown to the user
    PANEL = 3;
  }

  // The status of the deprecation
  optional DeprecationStatus deprecation_status = 1;
  // The type of delivery used to notify the user of the deprecation
  optional DeliveryType delivery_type = 2;
  // Whether the user was notified of the deprecation
  optional bool user_notified = 3;
  // Whether the user clicked the "More info" button
  optional bool more_info_clicked = 4;
  // Whether the user clicked the "Update" action
  optional bool update_clicked = 5;
  // Whether the deprecation was unplanned
  optional bool is_deprecation_unplanned = 6;
  // Whether the user dismissed the delivery type
