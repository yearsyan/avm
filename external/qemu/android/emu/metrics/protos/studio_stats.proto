    UNKNOWN_RESULT = 0;
    SUCCESS = 1;
    CANNOT_ENABLE_BMGR = 2;
    TRANSPORT_NOT_SELECTED = 3;
    TRANSPORT_INIT_FAILED = 4;
    GMSCORE_NOT_FOUND = 5;
    GMSCORE_IS_TOO_OLD = 6;
    BACKUP_FAILED = 7;
    RESTORE_FAILED = 8;
    INVALID_BACKUP_FILE = 9;
    UNEXPECTED_ERROR = 10;
    PLAY_STORE_NOT_INSTALLED = 11;
  }

  // A Backup event
  message BackupEvent {
    // Deprecated
    enum Type {
      UNKNOWN_BACKUP_TYPE = 0;
      D2D = 1;
      CLOUD = 2;
    }

    // Deprecated: use type_value
    optional Type type = 1 [deprecated = true];
    // Deprecated: use source_value
    optional Source source = 2 [deprecated = true];
    // Deprecated: use result_value
    optional Result result = 3 [deprecated = true];
    // Deprecated: use type_string
    optional int32 type_value = 4 [deprecated = true];
    // Deprecated: use source_string
    optional int32 source_value = 5 [deprecated = true];
    // Deprecated: use result_string
    optional int32 result_value = 6 [deprecated = true];
    optional string type_string = 7;    // e.g. CLOUD
    optional string source_string = 8;  // e.g. DEVICE_EXPLORER
    optional string result_string = 9;  // e.g. SUCCESS
  }

  // A Restore event
  message RestoreEvent {
    // Deprecated: use source_value
    optional Source source = 1 [deprecated = true];
    // Deprecated: use result_value
    optional Result result = 2 [deprecated = true];
    // Deprecated: use source_value
    optional int32 source_value = 3 [deprecated = true];
    // Deprecated: use result_string
    optional int32 result_value = 4 [deprecated = true];
    optional string source_string = 5;  // e.g. DEVICE_EXPLORER
    optional string result_string = 6;  // e.g. SUCCESS
  }
}

message StartupEvent {
