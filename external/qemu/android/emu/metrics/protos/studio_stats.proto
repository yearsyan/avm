                         // @Preview annotation).
    RESIZE_REVERTED = 3;  // User reverts back to the original preview settings
                          // (file source of truth).
  }

  // The type of resize mode used.
  enum ResizeMode {
    UNKNOWN_RESIZE_MODE = 0;
    DEVICE_RESIZE = 1;      // Resizing using device frame controls
    COMPOSABLE_RESIZE = 2;  // Resizing composable layout parameters
  }

  // The source of the resize event.
  enum ResizeSource {
    UNKNOWN_RESIZE_SOURCE = 0;
    DRAG = 1;  // Logs only when user released drag handle.
    DROPDOWN = 2;
    TEXT_FIELD = 3;
  }

  // The specific type of resize event that occurred.
  optional EventType event_type = 1;

  // The mode of resizing used.
  optional ResizeMode resize_mode = 2;

  // Width and height when user stops resizing (relevant for RESIZE_STOPPED
  // events).
  optional int32 stopped_device_width = 3 [deprecated = true];
  optional int32 stopped_device_height = 4 [deprecated = true];

  // Width and height when user saves the resized state (relevant for
  // RESIZE_SAVED events).
  optional int32 saved_device_width = 5 [deprecated = true];
  optional int32 saved_device_height = 6 [deprecated = true];

  // Width when user stops resizing or saves the resized state (relevant for
  // RESIZE_STOPPED and RESIZE_SAVED events). Unit: dp.
  optional int32 device_width_dp = 7;

  // Height when user stops resizing or saves the resized state (relevant for
  // RESIZE_STOPPED and RESIZE_SAVED events). Unit: dp.
  optional int32 device_height_dp = 8;

  // The DPI of the device.
  optional int32 dpi = 9;

  // The source of the resize event. It's applicable only for RESIZE_STOPPED
  optional ResizeSource resize_source = 10;

  // The ID of the selected device (relevant for DROPDOWN events).
  optional string device_id = 11;
