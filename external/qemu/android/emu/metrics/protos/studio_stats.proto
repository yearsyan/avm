    DESIGN_MODE = 1;
    PREVIEW_MODE = 2;
  }

  // Layout type
  enum Type {
    UNKNOWN_TYPE = 0;

    LAYOUT = 1;
    DRAWABLE = 2;
    MENU = 3;
    PREFERENCE_SCREEN = 4;
    COMPOSE = 5;
    CUSTOM_VIEWS = 6;
    GLANCE_WEAR_TILE = 7;
    GLANCE_APP_WIDGET = 8;
    VALIDATION_TOOL = 9;
    WEAR_TILE = 10;
  }

  // Layout orientation
  enum Orientation {
    UNKNOWN_ORIENTATION = 0;

    PORTRAIT = 1;
    LANDSCAPE = 2;
  }

