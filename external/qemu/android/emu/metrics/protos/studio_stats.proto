  }

  enum InsightExperiment {
    UNKNOWN_EXPERIMENT = 0;
    CONTROL = 1;

    // Code context experiments
    TOP_SOURCE = 2;
    TOP_THREE_SOURCES = 3;
    ALL_SOURCES = 4;
