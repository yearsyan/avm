    // Track when an aiplugin-provided action is taken
    AGENT_ACTION = 17;

    // Track when user interacts with insight generation
    GENERATE_INSIGHTS_ACTION = 18;
  }

  enum CrashType {
    UNKNOWN_TYPE = 0;
    FATAL = 1;
    NON_FATAL = 2;
    ANR = 3;
  }
  enum Confidence {
    UNKNOWN_CONFIDENCE = 0;
    LOW = 1;
    MEDIUM = 2;
    HIGH = 3;
  }
  enum Resolution {
    UNKNOWN_RESOLUTION = 0;
    LINE = 1;
    METHOD = 2;
    CLASS = 3;
    FAILED = 4;
