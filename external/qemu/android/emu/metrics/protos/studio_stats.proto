message NextEditPredictionEvent {
  message PredictionShown {
    // Add fields specific to the SHOWN event here, if any.
  }

  message PredictionAccepted {
    // Add fields specific to the ACCEPTED event here, if any.
  }

  message PredictionRejected {
    // Add fields specific to the REJECTED event here, if any.
  }

  message PredictionFailure {
    enum Reason {
      UNKNOWN = 0;
      // The content lines surrounding an edit do not match the document.
      CONTENT_LINE_MISMATCH = 1;
      // The line to be replaced was not found in the document.
      EXPECTED_LINE_NOT_FOUND = 2;
      // The prediction response was invalid and could not be parsed.
      INVALID_RESPONSE = 3;
    }
    optional Reason reason = 1;
  }

  message EnabledStatus {
    enum Status {
      UNKNOWN_STATUS = 0;
      ENABLED = 1;
      DISABLED = 2;
      PAUSED = 3;
    }
    optional Status status = 1;
  }

  // Represents a complete prediction session, containing multiple events
  // that describe the session's lifecycle.
  message Session {
    optional int64 start_wall_time_ms = 1;
    optional string model_id = 2;
    // Deprecated. Use editor_file_type instead.
    optional string language = 3 [deprecated = true];
    // True if the prediction was forced by a user action (e.g., a specific
    // keyboard shortcut), as opposed to being triggered automatically.
    optional bool forced = 4;
    repeated SessionEvent events = 5;
    optional EditorFileType editor_file_type = 6;

    message SessionEvent {
      enum EventType {
        UNKNOWN_EVENT_TYPE = 0;
        REQUEST_SENT = 1;
        // The prediction response was received from the model.
        RESPONSE_RECEIVED = 2;
        // The prediction was shown to the user. A single prediction can contain
        // multiple controls (e.g., diff chunks).
        PREDICTION_SHOWN = 3;
        // The prediction was accepted by the user (i.e., at least one
        // code-modifying control was accepted).
        PREDICTION_ACCEPTED = 4;
        // The prediction was rejected by the user (i.e., all code-modifying
        // controls were rejected or dismissed).
        PREDICTION_REJECTED = 5;
        SESSION_CANCELLED = 6;
        // A specific control within the prediction was shown to the user.
        // A single prediction can have multiple controls.
        CONTROL_SHOWN = 7;
        // A specific control was accepted by the user.
        CONTROL_ACCEPTED = 8;
        // A specific control was rejected by the user.
        CONTROL_REJECTED = 9;
        // A specific control was hidden from the user.
        CONTROL_HIDDEN = 10;
        // The prediction attempt failed.
        PREDICTION_FAILED = 11;
        // A specific control was disposed before being shown to the user.
        CONTROL_DISPOSED_UNSEEN = 12;
      }
      message ControlDetails {
        enum ControlType {
          UNKNOWN_CONTROL_TYPE = 0;
          MODIFICATION = 1;
          NAVIGATION = 2;
        }
        optional ControlType type = 1;
        optional int32 offset = 2;
        optional int32 original_length = 3;
        optional int32 new_length = 4;
      }
      message FailureDetails {
        enum FailureReason {
          UNKNOWN_FAILURE_REASON = 0;
          NO_HISTORY = 1;
          MODEL_ERROR = 2;
          PARSE_ERROR = 3;
          REPAIR_ERROR = 4;
          APPLY_ERROR = 5;
          EMPTY_RESPONSE = 6;
          CONTENT_LINE_MISMATCH = 7;
          EXPECTED_LINE_NOT_FOUND = 8;
          OUTDATED_PREDICTION = 9;
          NO_MODEL = 10;
        }
        optional FailureReason reason = 1;
      }
      optional EventType type = 1;
      // The time of this event relative to Session.start_wall_time_ms.
      optional int64 relative_time_ms = 2;

      // Deprecated in CL/868211533
      optional int32 offset = 3 [deprecated = true];
      optional int32 original_length = 4 [deprecated = true];
      optional int32 new_length = 5 [deprecated = true];

      message MetadataEntry {
        option deprecated = true;

        optional string key = 1;
        oneof value {
          string string_value = 2;
          int64 int_value = 3;
          double double_value = 4;
        }
      }
      // Deprecated. Do not use.
      repeated MetadataEntry metadata = 6 [deprecated = true];

      optional ControlDetails control_details = 7;
      optional FailureDetails failure_details = 8;
    }
  }

  message RequestSent {
    enum ModelType {
      UNKNOWN = 0;
      DEFAULT_MODEL_FREE_TIER = 1;
      DEFAULT_MODEL_PAID_TIER = 2;
      OTHER_MODEL = 3;
    }
    optional string model_id = 1;
    optional ModelType model_type = 2;
  }

  oneof next_edit_prediction {
    PredictionShown shown = 1 [lazy = true];
    PredictionAccepted accepted = 2 [lazy = true];
    PredictionRejected rejected = 3 [lazy = true];
    EnabledStatus enabled_status = 4 [lazy = true];
    PredictionFailure failure = 5 [lazy = true];
    Session session = 6 [lazy = true];
    RequestSent request_sent = 7 [lazy = true];
  }
}

