name: Build Emulator

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prebuilts_url:
        description: "Optional prebuilts artifact URL produced by scripts/bootstrap-prebuilts.sh --make-artifact"
        required: false
        type: string
      prebuilts_sha256:
        description: "Optional SHA-256 for the prebuilts artifact"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    name: macOS arm64 distribution
    runs-on: macos-15
    timeout-minutes: 180
    env:
      MACOS_DEPLOYMENT_TARGET: "11.0"
      BUILD_DIR: build/cmake
      CONAN_DIR: build/conan
      CONAN_HOME: ${{ github.workspace }}/.cache/conan-home
      PREBUILTS_CACHE_DIR: .cache/prebuilts-src
      MACOS_RELEASE_ENTITLEMENTS: scripts/macos-release-entitlements.plist
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_SIGNING_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
          conan_venv="$RUNNER_TEMP/conan-venv"
          python3 -m venv "$conan_venv"
          "$conan_venv/bin/python" -m pip install --upgrade pip
          "$conan_venv/bin/python" -m pip install "conan>=2,<3"
          echo "$conan_venv/bin" >> "$GITHUB_PATH"
          "$conan_venv/bin/conan" profile detect --force

      - name: Bootstrap prebuilts
        env:
          INPUT_PREBUILTS_URL: ${{ inputs.prebuilts_url }}
          INPUT_PREBUILTS_SHA256: ${{ inputs.prebuilts_sha256 }}
          SECRET_PREBUILTS_URL: ${{ secrets.AEMU_PREBUILTS_URL }}
          SECRET_PREBUILTS_SHA256: ${{ secrets.AEMU_PREBUILTS_SHA256 }}
        run: |
          set -euo pipefail
          prebuilts_url="${INPUT_PREBUILTS_URL:-${SECRET_PREBUILTS_URL:-}}"
          prebuilts_sha256="${INPUT_PREBUILTS_SHA256:-${SECRET_PREBUILTS_SHA256:-}}"

          if [[ -n "$prebuilts_url" ]]; then
            args=(--from-artifact "$prebuilts_url" --force)
            if [[ -n "$prebuilts_sha256" ]]; then
              args+=(--artifact-sha256 "$prebuilts_sha256")
            fi
            ./scripts/bootstrap-prebuilts.sh "${args[@]}"
          else
            ./scripts/bootstrap-prebuilts.sh --from-git --cache-dir "$PREBUILTS_CACHE_DIR" --force
          fi

          ./scripts/bootstrap-prebuilts.sh --verify

      - name: Build emulator
        run: ./scripts/build_headless_macos.sh

      - name: Import Developer ID certificate
        if: env.MACOS_SIGNING_ENABLED == 'true'
        env:
          MACOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/aemu-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          echo "::add-mask::$keychain_password"

          printf '%s' "$MACOS_SIGNING_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          current_keychains=()
          while IFS= read -r keychain; do
            keychain="${keychain#\"}"
            keychain="${keychain%\"}"
            current_keychains+=("$keychain")
          done < <(security list-keychains -d user | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$keychain_path" "${current_keychains[@]}"
          security default-keychain -d user -s "$keychain_path"
          security import "$certificate_path" \
            -f pkcs12 \
            -k "$keychain_path" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identity_report="$RUNNER_TEMP/codesigning-identities.txt"
          security find-identity -v -p codesigning "$keychain_path" | tee "$identity_report"
          identity_matches="$(grep -F "$MACOS_CODESIGN_IDENTITY" "$identity_report" || true)"
          identity_match_count="$(printf '%s\n' "$identity_matches" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "$identity_match_count" != "1" ]]; then
            echo "::error::MACOS_CODESIGN_IDENTITY was not found in the imported signing keychain. Check that the P12 includes the Developer ID Application private key and that the identity secret matches one of the listed identities."
            exit 1
          fi
          resolved_codesign_identity="$(printf '%s\n' "$identity_matches" | awk 'NR == 1 { print $2 }')"
          if [[ -z "$resolved_codesign_identity" ]]; then
            echo "::error::Unable to resolve a codesign identity SHA-1 from the imported signing keychain."
            exit 1
          fi

          xcrun notarytool store-credentials aemu-notary \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD" \
            --keychain "$keychain_path"

          echo "MACOS_CODESIGN_IDENTITY=$resolved_codesign_identity" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_KEYCHAIN_PASSWORD=$keychain_password" >> "$GITHUB_ENV"

      - name: Sign distribution
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          security unlock-keychain -p "$MACOS_CODESIGN_KEYCHAIN_PASSWORD" "$MACOS_CODESIGN_KEYCHAIN"
          security find-identity -v -p codesigning "$MACOS_CODESIGN_KEYCHAIN"
          ./scripts/sign_macos_distribution.sh \
            --dist-dir "$BUILD_DIR/distribution/emulator" \
            --identity "$MACOS_CODESIGN_IDENTITY" \
            --entitlements "$MACOS_RELEASE_ENTITLEMENTS" \
            --keychain "$MACOS_CODESIGN_KEYCHAIN"
          codesign -d --entitlements :- "$BUILD_DIR/distribution/emulator/emulator"

      - name: Package distribution
        run: |
          set -euo pipefail
          dist_dir="$BUILD_DIR/distribution/emulator"
          archive="$RUNNER_TEMP/aemu-emulator-darwin-aarch64.zip"
          test -x "$dist_dir/emulator"
          ditto -c -k --sequesterRsrc --keepParent "$dist_dir" "$archive"
          du -sh "$dist_dir" "$archive"

      - name: Notarize distribution
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/aemu-emulator-darwin-aarch64.zip"
          notary_result="$RUNNER_TEMP/notary-result.json"

          set +e
          xcrun notarytool submit "$archive" \
            --keychain-profile aemu-notary \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            --wait \
            --output-format json > "$notary_result"
          notary_exit=$?
          set -e

          cat "$notary_result"
          submission_id="$(plutil -extract id raw -o - "$notary_result" 2>/dev/null || true)"
          notary_status="$(plutil -extract status raw -o - "$notary_result" 2>/dev/null || true)"

          if [[ "$notary_exit" -ne 0 || "$notary_status" != "Accepted" ]]; then
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --keychain-profile aemu-notary \
                --keychain "$MACOS_CODESIGN_KEYCHAIN" || true
            fi
            exit 1
          fi

          codesign --verify --strict --verbose=2 "$BUILD_DIR/distribution/emulator/emulator"
          codesign -dvv "$BUILD_DIR/distribution/emulator/emulator"

      - name: Generate checksum
        run: |
          set -euo pipefail
          shasum -a 256 "$RUNNER_TEMP/aemu-emulator-darwin-aarch64.zip" | tee "$RUNNER_TEMP/aemu-emulator-darwin-aarch64.sha256"

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: aemu-emulator-darwin-aarch64
          path: |
            ${{ runner.temp }}/aemu-emulator-darwin-aarch64.zip
            ${{ runner.temp }}/aemu-emulator-darwin-aarch64.sha256
          if-no-files-found: error
          retention-days: 14
