name: Build MacMu macOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prebuilts_url:
        description: "Optional prebuilts artifact URL produced by scripts/bootstrap-prebuilts.sh --make-artifact"
        required: false
        type: string
      prebuilts_sha256:
        description: "Optional SHA-256 for the prebuilts artifact"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos-arm64:
    name: MacMu macOS arm64 distribution
    runs-on: macos-15
    timeout-minutes: 180
    env:
      MACOS_DEPLOYMENT_TARGET: "11.0"
      BUILD_DIR: build/cmake
      CONAN_DIR: build/conan
      DIST_DIR: build/cmake/distribution/emulator
      CONAN_HOME: ${{ github.workspace }}/.cache/conan-home
      CMAKE_GENERATOR: Ninja
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_DIR: ${{ github.workspace }}/.cache/ccache
      CCACHE_MAXSIZE: 2G
      CCACHE_NOHASHDIR: "1"
      PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
      PREBUILTS_CACHE_DIR: .cache/prebuilts-src
      QEMU_HEADLESS_REL: qemu/darwin-aarch64/qemu-system-aarch64-headless
      MACMU_BINARY: macmu
      MACMU_APP_NAME: MacMu
      MACMU_BUNDLE_ID: dev.macmu.MacMu
      PACKAGE_BASENAME: macmu-macos-arm64
      MACOS_RELEASE_ENTITLEMENTS: scripts/macos-release-entitlements.plist
      MACOS_SIGNING_ENABLED: ${{ secrets.MACOS_SIGNING_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' && secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: conan-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: pip-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Install build tools
        run: |
          set -euo pipefail
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
          brew list ccache >/dev/null 2>&1 || brew install ccache
          conan_venv="$RUNNER_TEMP/conan-venv"
          python3 -m venv "$conan_venv"
          "$conan_venv/bin/python" -m pip install --upgrade pip
          "$conan_venv/bin/python" -m pip install "conan>=2,<3"
          echo "$conan_venv/bin" >> "$GITHUB_PATH"
          "$conan_venv/bin/conan" profile detect --force
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --zero-stats

      - name: Bootstrap prebuilts
        env:
          INPUT_PREBUILTS_URL: ${{ inputs.prebuilts_url }}
          INPUT_PREBUILTS_SHA256: ${{ inputs.prebuilts_sha256 }}
          SECRET_PREBUILTS_URL: ${{ secrets.MACMU_PREBUILTS_URL || secrets.AEMU_PREBUILTS_URL }}
          SECRET_PREBUILTS_SHA256: ${{ secrets.MACMU_PREBUILTS_SHA256 || secrets.AEMU_PREBUILTS_SHA256 }}
        run: |
          set -euo pipefail
          prebuilts_url="${INPUT_PREBUILTS_URL:-${SECRET_PREBUILTS_URL:-}}"
          prebuilts_sha256="${INPUT_PREBUILTS_SHA256:-${SECRET_PREBUILTS_SHA256:-}}"

          if [[ -n "$prebuilts_url" ]]; then
            if [[ -z "$prebuilts_sha256" ]]; then
              echo "::error::prebuilts_sha256 is required when prebuilts_url is set"
              exit 1
            fi
            ./scripts/bootstrap-prebuilts.sh \
              --from-artifact "$prebuilts_url" \
              --artifact-sha256 "$prebuilts_sha256" \
              --force
          else
            ./scripts/bootstrap-prebuilts.sh --from-git --cache-dir "$PREBUILTS_CACHE_DIR" --force
          fi

      - name: Build MacMu distribution
        run: ./scripts/build_headless_macos.sh

      - name: Show ccache stats
        if: always()
        run: |
          set -euo pipefail
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          fi

      - name: Import Developer ID certificate
        if: env.MACOS_SIGNING_ENABLED == 'true'
        env:
          MACOS_SIGNING_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_SIGNING_CERTIFICATE_P12_BASE64 }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          keychain_path="$RUNNER_TEMP/macmu-signing.keychain-db"
          keychain_password="$(uuidgen)"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          echo "::add-mask::$keychain_password"

          printf '%s' "$MACOS_SIGNING_CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          current_keychains=()
          while IFS= read -r keychain; do
            keychain="${keychain#\"}"
            keychain="${keychain%\"}"
            current_keychains+=("$keychain")
          done < <(security list-keychains -d user | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$keychain_path" "${current_keychains[@]}"
          security default-keychain -d user -s "$keychain_path"
          security import "$certificate_path" \
            -f pkcs12 \
            -k "$keychain_path" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identity_report="$RUNNER_TEMP/codesigning-identities.txt"
          security find-identity -v -p codesigning "$keychain_path" | tee "$identity_report"
          identity_matches="$(grep -F "$MACOS_CODESIGN_IDENTITY" "$identity_report" || true)"
          identity_match_count="$(printf '%s\n' "$identity_matches" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [[ "$identity_match_count" != "1" ]]; then
            echo "::error::MACOS_CODESIGN_IDENTITY was not found in the imported signing keychain. Check that the P12 includes the Developer ID Application private key and that the identity secret matches one of the listed identities."
            exit 1
          fi
          resolved_codesign_identity="$(printf '%s\n' "$identity_matches" | awk 'NR == 1 { print $2 }')"
          if [[ -z "$resolved_codesign_identity" ]]; then
            echo "::error::Unable to resolve a codesign identity SHA-1 from the imported signing keychain."
            exit 1
          fi

          xcrun notarytool store-credentials macmu-notary \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD" \
            --keychain "$keychain_path"

          echo "MACOS_CODESIGN_IDENTITY=$resolved_codesign_identity" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"
          echo "MACOS_CODESIGN_KEYCHAIN_PASSWORD=$keychain_password" >> "$GITHUB_ENV"

      - name: Sign distribution
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          security unlock-keychain -p "$MACOS_CODESIGN_KEYCHAIN_PASSWORD" "$MACOS_CODESIGN_KEYCHAIN"
          security find-identity -v -p codesigning "$MACOS_CODESIGN_KEYCHAIN"
          ./scripts/sign_macos_distribution.sh \
            --dist-dir "$DIST_DIR" \
            --identity "$MACOS_CODESIGN_IDENTITY" \
            --entitlements "$MACOS_RELEASE_ENTITLEMENTS" \
            --keychain "$MACOS_CODESIGN_KEYCHAIN"
          codesign -d --entitlements :- "$DIST_DIR/$QEMU_HEADLESS_REL"

      - name: Package distribution and app bundle
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/$PACKAGE_BASENAME.zip"
          package_root="$RUNNER_TEMP/$PACKAGE_BASENAME"
          app_path="$RUNNER_TEMP/$MACMU_APP_NAME.app"
          test -x "$DIST_DIR/$MACMU_BINARY"
          test -x "$DIST_DIR/$QEMU_HEADLESS_REL"
          test -f "$DIST_DIR/LICENSE.shell-MIT"
          test ! -e "$DIST_DIR/aemu-iosurface-shell"
          test ! -e "$DIST_DIR/emulator"
          rm -rf "$package_root"
          ditto "$DIST_DIR" "$package_root"
          ditto -c -k --sequesterRsrc --keepParent "$package_root" "$archive"
          ./scripts/package_macos_app.sh \
            --dist-dir "$DIST_DIR" \
            --out-dir "$RUNNER_TEMP" \
            --app-name "$MACMU_APP_NAME" \
            --binary-name "$MACMU_BINARY" \
            --bundle-id "$MACMU_BUNDLE_ID" \
            --package-basename "$PACKAGE_BASENAME" \
            --build-version "${GITHUB_RUN_NUMBER:-1}" \
            --no-zip \
            --no-dmg
          test -x "$app_path/Contents/MacOS/$MACMU_BINARY"
          test -x "$app_path/Contents/Resources/emulator/$QEMU_HEADLESS_REL"
          du -sh "$DIST_DIR" "$archive" "$app_path"

      - name: Sign app bundle
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          app_path="$RUNNER_TEMP/$MACMU_APP_NAME.app"
          security unlock-keychain -p "$MACOS_CODESIGN_KEYCHAIN_PASSWORD" "$MACOS_CODESIGN_KEYCHAIN"
          codesign --force --timestamp --options runtime \
            --sign "$MACOS_CODESIGN_IDENTITY" \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dvv "$app_path"

      - name: Notarize app bundle
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          app_path="$RUNNER_TEMP/$MACMU_APP_NAME.app"
          app_notary_zip="$RUNNER_TEMP/$PACKAGE_BASENAME-app-notary.zip"
          notary_result="$RUNNER_TEMP/notary-app-result.json"

          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$app_notary_zip"

          set +e
          xcrun notarytool submit "$app_notary_zip" \
            --keychain-profile macmu-notary \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            --wait \
            --output-format json > "$notary_result"
          notary_exit=$?
          set -e

          cat "$notary_result"
          submission_id="$(plutil -extract id raw -o - "$notary_result" 2>/dev/null || true)"
          notary_status="$(plutil -extract status raw -o - "$notary_result" 2>/dev/null || true)"

          if [[ "$notary_exit" -ne 0 || "$notary_status" != "Accepted" ]]; then
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --keychain-profile macmu-notary \
                --keychain "$MACOS_CODESIGN_KEYCHAIN" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$app_path"
          xcrun stapler validate "$app_path"
          spctl -a -t exec -vv "$app_path"

      - name: Package app archives
        run: |
          set -euo pipefail
          app_path="$RUNNER_TEMP/$MACMU_APP_NAME.app"
          app_zip="$RUNNER_TEMP/$PACKAGE_BASENAME-app.zip"
          dmg_root="$RUNNER_TEMP/$PACKAGE_BASENAME-dmg-root"
          dmg_path="$RUNNER_TEMP/$PACKAGE_BASENAME.dmg"

          rm -rf "$app_zip" "$dmg_root" "$dmg_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "$app_zip"
          mkdir -p "$dmg_root"
          ditto "$app_path" "$dmg_root/$MACMU_APP_NAME.app"
          ln -s /Applications "$dmg_root/Applications"
          hdiutil create -volname "$MACMU_APP_NAME" -srcfolder "$dmg_root" -ov -format UDZO "$dmg_path"
          du -sh "$app_zip" "$dmg_path"

      - name: Sign DMG
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          dmg_path="$RUNNER_TEMP/$PACKAGE_BASENAME.dmg"
          security unlock-keychain -p "$MACOS_CODESIGN_KEYCHAIN_PASSWORD" "$MACOS_CODESIGN_KEYCHAIN"
          codesign --force --timestamp \
            --sign "$MACOS_CODESIGN_IDENTITY" \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            "$dmg_path"
          codesign --verify --strict --verbose=2 "$dmg_path"

      - name: Notarize distribution
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/$PACKAGE_BASENAME.zip"
          notary_result="$RUNNER_TEMP/notary-result.json"

          set +e
          xcrun notarytool submit "$archive" \
            --keychain-profile macmu-notary \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            --wait \
            --output-format json > "$notary_result"
          notary_exit=$?
          set -e

          cat "$notary_result"
          submission_id="$(plutil -extract id raw -o - "$notary_result" 2>/dev/null || true)"
          notary_status="$(plutil -extract status raw -o - "$notary_result" 2>/dev/null || true)"

          if [[ "$notary_exit" -ne 0 || "$notary_status" != "Accepted" ]]; then
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --keychain-profile macmu-notary \
                --keychain "$MACOS_CODESIGN_KEYCHAIN" || true
            fi
            exit 1
          fi

          codesign --verify --strict --verbose=2 "$DIST_DIR/$MACMU_BINARY"
          codesign --verify --strict --verbose=2 "$DIST_DIR/$QEMU_HEADLESS_REL"
          codesign -dvv "$DIST_DIR/$QEMU_HEADLESS_REL"

      - name: Notarize DMG
        if: env.MACOS_SIGNING_ENABLED == 'true'
        run: |
          set -euo pipefail
          dmg_path="$RUNNER_TEMP/$PACKAGE_BASENAME.dmg"
          notary_result="$RUNNER_TEMP/notary-dmg-result.json"

          set +e
          xcrun notarytool submit "$dmg_path" \
            --keychain-profile macmu-notary \
            --keychain "$MACOS_CODESIGN_KEYCHAIN" \
            --wait \
            --output-format json > "$notary_result"
          notary_exit=$?
          set -e

          cat "$notary_result"
          submission_id="$(plutil -extract id raw -o - "$notary_result" 2>/dev/null || true)"
          notary_status="$(plutil -extract status raw -o - "$notary_result" 2>/dev/null || true)"

          if [[ "$notary_exit" -ne 0 || "$notary_status" != "Accepted" ]]; then
            if [[ -n "$submission_id" ]]; then
              xcrun notarytool log "$submission_id" \
                --keychain-profile macmu-notary \
                --keychain "$MACOS_CODESIGN_KEYCHAIN" || true
            fi
            exit 1
          fi

          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -t open --context context:primary-signature -vv "$dmg_path"

      - name: Generate checksum
        run: |
          set -euo pipefail
          (
            cd "$RUNNER_TEMP"
            shasum -a 256 \
              "$PACKAGE_BASENAME.zip" \
              "$PACKAGE_BASENAME-app.zip" \
              "$PACKAGE_BASENAME.dmg"
          ) | tee "$RUNNER_TEMP/$PACKAGE_BASENAME.sha256"

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: |
            ${{ runner.temp }}/${{ env.PACKAGE_BASENAME }}.zip
            ${{ runner.temp }}/${{ env.PACKAGE_BASENAME }}-app.zip
            ${{ runner.temp }}/${{ env.PACKAGE_BASENAME }}.dmg
            ${{ runner.temp }}/${{ env.PACKAGE_BASENAME }}.sha256
          if-no-files-found: error
          retention-days: 14
